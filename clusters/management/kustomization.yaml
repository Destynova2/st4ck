apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Applied by the Flux Kustomization `management` (stacks/flux-bootstrap/
# main.tf) which dependsOn `management-eso`. By the time we run, ESO is
# already installed (CRDs available), so the ClusterSecretStore in
# external-secrets/flux-config can apply without dry-run failures.
resources:
  - ../../stacks/external-secrets/flux-config   # ClusterSecretStore (depends on ESO CRD)
  - ../../stacks/cni/flux
  - ../../stacks/monitoring/flux
  - ../../stacks/pki/flux
  - ../../stacks/identity/flux
  - ../../stacks/security/flux
  - ../../stacks/storage/flux
  # OpenClarity install is a two-phase Flux Kustomization (eso → HR) that
  # gates the chart on the ExternalSecret pipeline reaching Ready. The two
  # Kustomization CRs declared in security-openclarity.yaml each point at
  # their own sub-folder under stacks/security/ (flux-openclarity-eso/ and
  # flux-openclarity/) — they are NOT sub-resources of this kustomization.
  - security-openclarity.yaml
