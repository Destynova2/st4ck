apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: storage
spec:
  interval: 30m
  dependsOn:
    - name: garage
      namespace: garage
  chart:
    spec:
      chart: velero
      version: "11.4.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  install:
    createNamespace: false
    timeout: 10m
  valuesFrom:
    - kind: ConfigMap
      name: velero-values
      valuesKey: values.yaml
      optional: false
