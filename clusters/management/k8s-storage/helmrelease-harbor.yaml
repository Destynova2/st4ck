apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: storage
spec:
  interval: 30m
  dependsOn:
    - name: garage
      namespace: garage
  chart:
    spec:
      chart: harbor
      version: "1.16.2"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
  install:
    createNamespace: false
    timeout: 10m
  valuesFrom:
    - kind: ConfigMap
      name: harbor-values
      valuesKey: values.yaml
      optional: false
    - kind: Secret
      name: harbor-secrets
      valuesKey: values.yaml
      optional: false
