apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tetragon
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: tetragon
      version: "1.6.0"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: tetragon-values
      valuesKey: values.yaml
      optional: false
