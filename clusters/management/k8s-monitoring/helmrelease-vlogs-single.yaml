apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-logs-single
      version: "0.14.3"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: vlogs-single-values
      valuesKey: values.yaml
      optional: false
