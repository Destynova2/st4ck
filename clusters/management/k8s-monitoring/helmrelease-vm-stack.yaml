apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-k8s-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.72.4"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    createNamespace: false
    timeout: 10m
  valuesFrom:
    - kind: ConfigMap
      name: vm-k8s-stack-values
      valuesKey: values.yaml
      optional: false
