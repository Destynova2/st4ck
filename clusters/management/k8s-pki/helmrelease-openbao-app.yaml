apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao-app
  namespace: secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: openbao
      version: "0.25.6"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: openbao-app-values
      valuesKey: values.yaml
      optional: false
