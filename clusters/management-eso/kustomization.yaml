apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Flux Kustomization "management-eso" applies this — installs ESO before
# anything else so the ClusterSecretStore CRD exists by the time the
# `management` Kustomization runs (which depends on us via dependsOn).
# See stacks/flux-bootstrap/main.tf for the wiring.
resources:
  - ../../stacks/external-secrets/flux
