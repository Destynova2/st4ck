# Force kubelet to register the node with its Scaleway VPC private IP
# (172.16.0.0/22, eth1) instead of the public IP (eth0).
#
# Why: Scaleway Instances on a VPC have two NICs — eth0 public and eth1
# private. By default Talos picks eth0 as kubelet --node-ip, which makes
# K8s register InternalIP = public IP. Cilium then sources its VXLAN
# tunnel from that public IP, but the cluster security group only allows
# UDP/8472 from the VPC subnet → tunnel dropped → "Cluster health: 1/6
# reachable" + cross-node webhook calls time out.
#
# Setting validSubnets to the VPC CIDR makes Talos pick the eth1 IP. K8s
# then registers nodes with InternalIP = 172.16.x.x, Cilium VXLAN flows
# stay inside the VPC, and the existing SG rule (ip_range = VPC subnet)
# accepts them.
machine:
  kubelet:
    nodeIP:
      # Scaleway VPC private subnet is auto-allocated within 172.16.0.0/16,
      # any /22 in that block (e.g. 172.16.0.0/22, 172.16.12.0/22, …) — so
      # match the whole /16 instead of a specific /22 to survive VPC
      # re-allocation across destroy/create cycles.
      validSubnets:
        - 172.16.0.0/16
