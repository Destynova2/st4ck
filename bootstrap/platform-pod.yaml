apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
data:
  config.hcl: |
    ui            = true
    disable_mlock = true
    api_addr      = "http://127.0.0.1:8200"
    cluster_addr  = "http://127.0.0.1:8201"
    listener "tcp" {
      address         = "0.0.0.0:8200"
      cluster_address = "0.0.0.0:8201"
      tls_disable     = true
    }
    storage "raft" {
      path    = "/bao/data"
      node_id = "node-0"
    }
    seal "static" {
      current_key_id = "bootstrap-1"
      current_key    = "file:///bao/seal/unseal.key"
    }

    # ─── Self-init: KV v2 for tfstate + cluster secrets ──────────
    initialize "kv" {
      request "mount-kv" {
        operation = "update"
        path      = "sys/mounts/secret"
        data = {
          type    = "kv"
          options = { version = "2" }
        }
      }
    }

    # ─── Self-init: Transit for auto-unseal ──────────────────────
    initialize "transit" {
      request "mount-transit" {
        operation = "update"
        path      = "sys/mounts/transit"
        data      = { type = "transit" }
      }
      request "create-autounseal-key" {
        operation = "update"
        path      = "transit/keys/autounseal"
        data      = { type = "aes256-gcm96" }
      }
    }

    # ─── Self-init: PKI Root CA ──────────────────────────────────
    initialize "pki" {
      request "mount-pki" {
        operation = "update"
        path      = "sys/mounts/pki"
        data      = { type = "pki", config = { max_lease_ttl = "87600h" } }
      }
      request "generate-root-ca" {
        operation = "update"
        path      = "pki/root/generate/internal"
        data = {
          common_name  = "Talos Platform Root CA"
          organization = "Talos Platform"
          key_type     = "ec"
          key_bits     = 384
          ttl          = "87600h"
          issuer_name  = "root"
        }
      }
    }

    # ─── Self-init: Infra Sub-CA ─────────────────────────────────
    initialize "pki-infra" {
      request "mount" {
        operation = "update"
        path      = "sys/mounts/pki_infra"
        data      = { type = "pki", config = { max_lease_ttl = "43800h" } }
      }
      request "generate-csr" {
        operation     = "update"
        path          = "pki_infra/intermediate/generate/exported"
        allow_failure = true
        data = {
          common_name  = "Talos Platform Infra CA"
          organization = "Talos Platform"
          key_type     = "ec"
          key_bits     = 384
          issuer_name  = "infra"
        }
      }
    }

    # ─── Self-init: App Sub-CA ───────────────────────────────────
    initialize "pki-app" {
      request "mount" {
        operation = "update"
        path      = "sys/mounts/pki_app"
        data      = { type = "pki", config = { max_lease_ttl = "43800h" } }
      }
      request "generate-csr" {
        operation     = "update"
        path          = "pki_app/intermediate/generate/exported"
        allow_failure = true
        data = {
          common_name  = "Talos Platform App CA"
          organization = "Talos Platform"
          key_type     = "ec"
          key_bits     = 384
          issuer_name  = "app"
        }
      }
    }

    # ─── Self-init: Admin auth (for ci-setup to create tokens) ──
    initialize "admin" {
      request "add-superuser-policy" {
        operation = "update"
        path      = "sys/policies/acl/superuser"
        data = {
          policy = "path \"*\" { capabilities = [\"create\",\"update\",\"read\",\"delete\",\"list\",\"sudo\"] }"
        }
      }
      request "mount-userpass" {
        operation = "update"
        path      = "sys/auth/userpass"
        data = {
          type = "userpass"
        }
      }
      request "create-admin-user" {
        operation = "update"
        path      = "auth/userpass/users/bootstrap-admin"
        data = {
          "password" = {
            eval_type   = "string"
            eval_source = "env"
            env_var     = "BAO_ADMIN_PASSWORD"
          }
          "token_policies" = ["superuser"]
        }
      }
    }

    # ─── Self-init: Policies ─────────────────────────────────────
    initialize "policies" {
      request "vault-backend-policy" {
        operation = "update"
        path      = "sys/policies/acl/vault-backend"
        data = {
          policy = "path \"secret/data/tfstate/*\" { capabilities = [\"create\",\"read\",\"update\"] }\npath \"secret/metadata/tfstate/*\" { capabilities = [\"delete\",\"read\",\"list\"] }"
        }
      }
      request "cluster-secrets-ro-policy" {
        operation = "update"
        path      = "sys/policies/acl/cluster-secrets-ro"
        data = {
          policy = "path \"secret/data/cluster/*\" { capabilities = [\"read\"] }"
        }
      }
      request "autounseal-policy" {
        operation = "update"
        path      = "sys/policies/acl/autounseal"
        data = {
          policy = "path \"transit/encrypt/autounseal\" { capabilities = [\"update\"] }\npath \"transit/decrypt/autounseal\" { capabilities = [\"update\"] }"
        }
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: platform
  labels:
    app: platform
spec:
  restartPolicy: Always
  containers:
    # ═══ OpenBao KMS (single Raft node) ══════════════════════════════
    - name: bao
      image: quay.io/openbao/openbao:2.5.0
      command: ["bao", "server", "-config=/config/config.hcl"]
      ports:
        - containerPort: 8200
          hostPort: 8200
        - containerPort: 8201
          hostPort: 8201
      env:
        - name: SKIP_CHOWN
          value: "true"
        - name: BAO_ADMIN_PASSWORD
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_PASSWORD } }
      volumeMounts:
        - name: openbao-config
          mountPath: /config
          readOnly: true
        - name: bao-data
          mountPath: /bao/data
        - name: bao-seal
          mountPath: /bao/seal
          readOnly: true

    # ═══ vault-backend (TF state HTTP → OpenBao KV v2) ═══════════════
    - name: vault-backend
      image: docker.io/gherynos/vault-backend:latest
      command: ["sh", "-c"]
      args:
        - |
          echo "[vault-backend] Waiting for KMS token..."
          while [ ! -f /kms-output/vault-backend-token.txt ]; do sleep 2; done
          export VAULT_TOKEN=$(cat /kms-output/vault-backend-token.txt)
          echo "[vault-backend] Token loaded, starting"
          exec /vault-backend
      ports:
        - containerPort: 8080
          hostPort: 8080
      env:
        - name: VAULT_URL
          value: "http://127.0.0.1:8200"
        - name: VAULT_STORE
          value: "secret"
        - name: VAULT_PREFIX
          value: "tfstate"
        - name: LISTEN_ADDRESS
          value: "0.0.0.0:8080"
      volumeMounts:
        - name: kms-output
          mountPath: /kms-output
          readOnly: true

    # ═══ Gitea (rootless, env vars applied by entrypoint) ═════════════
    - name: gitea
      image: docker.io/gitea/gitea:1.22-rootless
      ports:
        - containerPort: 3000
          hostPort: 3000
        - containerPort: 2222
          hostPort: 2222
      volumeMounts:
        - name: gitea-data
          mountPath: /var/lib/gitea
        - name: gitea-config
          mountPath: /etc/gitea
      env:
        - name: GITEA__server__ROOT_URL
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_GITEA_URL } }
        - name: GITEA__server__DOMAIN
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_DOMAIN } }
        - name: GITEA__webhook__ALLOWED_HOST_LIST
          value: "loopback,private"
        - name: GITEA__database__DB_TYPE
          value: "sqlite3"

    # ═══ Woodpecker server (v3, reads OAuth creds from files) ═════════
    - name: woodpecker-server
      image: docker.io/woodpeckerci/woodpecker-server:v3
      ports:
        - containerPort: 8000
          hostPort: 8000
        - containerPort: 9000
          hostPort: 9000
      volumeMounts:
        - name: woodpecker-data
          mountPath: /var/lib/woodpecker
        - name: shared
          mountPath: /shared
          readOnly: true
      env:
        - name: WOODPECKER_HOST
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_WP_HOST } }
        - name: WOODPECKER_OPEN
          value: "true"
        - name: WOODPECKER_ADMIN
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_ADMIN } }
        - name: WOODPECKER_GITEA
          value: "true"
        - name: WOODPECKER_GITEA_URL
          value: "http://platform-gitea:3000"
        - name: WOODPECKER_GITEA_CLIENT_FILE
          value: "/shared/gitea-client"
        - name: WOODPECKER_GITEA_SECRET_FILE
          value: "/shared/gitea-secret"
        - name: WOODPECKER_AGENT_SECRET_FILE
          value: "/shared/agent-secret"
        - name: WOODPECKER_DEV_GITEA_OAUTH_URL
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_OAUTH_URL } }

    # ═══ Woodpecker agent ════════════════════════════════════════════
    - name: woodpecker-agent
      image: docker.io/woodpeckerci/woodpecker-agent:v3
      command: ["woodpecker-agent", "agent"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: podman-sock
          mountPath: /var/run/docker.sock
        - name: shared
          mountPath: /shared
          readOnly: true
      env:
        - name: WOODPECKER_SERVER
          value: "platform-woodpecker-server:9000"
        - name: WOODPECKER_BACKEND
          value: "docker"
        - name: WOODPECKER_AGENT_SECRET_FILE
          value: "/shared/agent-secret"
        - name: WOODPECKER_BACKEND_DOCKER_NETWORK
          value: "podman-default-kube-network"

    # ═══ CI setup sidecar ════════════════════════════════════════════
    - name: ci-setup
      image: docker.io/gitea/gitea:1.22-rootless
      command: ["sh", "/scripts/setup.sh"]
      volumeMounts:
        - name: gitea-data
          mountPath: /var/lib/gitea
        - name: gitea-config
          mountPath: /etc/gitea
        - name: shared
          mountPath: /shared
        - name: source
          mountPath: /source
          readOnly: true
        - name: kms-output
          mountPath: /kms-output
        - name: setup-script
          mountPath: /scripts
          readOnly: true
      env:
        - name: CI_ADMIN
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_ADMIN } }
        - name: CI_PASSWORD
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_PASSWORD } }
        - name: CI_WP_HOST
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_WP_HOST } }
        - name: CI_OAUTH_URL
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_OAUTH_URL } }
        - name: CI_GIT_REPO_URL
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_GIT_REPO_URL } }
        - name: CI_SCW_PROJECT_ID
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_SCW_PROJECT_ID } }
        - name: CI_SCW_IMAGE_ACCESS_KEY
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_SCW_IMAGE_ACCESS_KEY } }
        - name: CI_SCW_IMAGE_SECRET_KEY
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_SCW_IMAGE_SECRET_KEY } }
        - name: CI_SCW_CLUSTER_ACCESS_KEY
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_SCW_CLUSTER_ACCESS_KEY } }
        - name: CI_SCW_CLUSTER_SECRET_KEY
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_SCW_CLUSTER_SECRET_KEY } }
        - name: CI_AGENT_SECRET
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_AGENT_SECRET } }
        - name: CI_GITEA_URL
          valueFrom: { configMapKeyRef: { name: platform-config, key: CI_GITEA_URL } }

  volumes:
    - name: openbao-config
      configMap: { name: openbao-config }
    - name: setup-script
      configMap: { name: setup-script }
    - name: bao-data
      emptyDir: {}
    - name: bao-seal
      configMap: { name: bao-seal-key }
    - name: gitea-data
      persistentVolumeClaim: { claimName: platform-gitea-data }
    - name: gitea-config
      persistentVolumeClaim: { claimName: platform-gitea-config }
    - name: woodpecker-data
      persistentVolumeClaim: { claimName: platform-wp-data }
    - name: podman-sock
      persistentVolumeClaim: { claimName: platform-podman-sock }
    - name: shared
      persistentVolumeClaim: { claimName: platform-shared }
    - name: source
      hostPath: { path: __SOURCE_DIR__, type: Directory }
    - name: kms-output
      persistentVolumeClaim: { claimName: platform-kms-output }
