# Prometheus Node Exporter — host-level metrics (CPU, RAM, disk, network)
# Compatible with Talos Linux (immutable OS, no systemd)

hostNetwork: true
hostPID: true
hostRootFsMount:
  enabled: true
  mountPropagation: HostToContainer

# Run on all nodes including control plane
tolerations:
  - operator: Exists
    effect: NoSchedule

# Only add Talos-specific exclusions (path.procfs/sysfs/rootfs are set by the chart)
extraArgs:
  - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/kubelet/.+|var/lib/containerd/.+|system)($|/)
  - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    memory: 64Mi

prometheus:
  monitor:
    enabled: false
