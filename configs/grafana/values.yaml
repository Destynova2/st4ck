# Grafana — dashboards & visualization

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Give Grafana time to download dashboards from grafana.com before probing
readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 10

# Sidecar for auto-loading dashboards from ConfigMaps
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: ALL

# Pre-configured datasources
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://victoria-metrics-single-server.monitoring.svc:8428
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc:3100
        access: proxy
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        url: http://alertmanager.monitoring.svc:9093
        access: proxy
        jsonData:
          implementation: prometheus

# Dashboard providers
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: logs
        orgId: 1
        folder: Logs
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/logs
      - name: system
        orgId: 1
        folder: System
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/system

# Dashboards from grafana.com (Cilium dashboards come from Cilium chart itself)
dashboards:
  kubernetes:
    k8s-global:
      gnetId: 15757
      revision: 37
      datasource: Prometheus
    k8s-nodes:
      gnetId: 15759
      revision: 29
      datasource: Prometheus
    k8s-pods:
      gnetId: 15760
      revision: 28
      datasource: Prometheus
  logs:
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource: Loki
    loki-container-log:
      gnetId: 16966
      revision: 1
      datasource: Loki
  system:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    cadvisor:
      gnetId: 14282
      revision: 1
      datasource: Prometheus
    k8s-resources-cluster:
      gnetId: 7249
      revision: 1
      datasource: Prometheus
