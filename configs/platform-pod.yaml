apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
data:
  node-0.hcl: |
    ui = true
    disable_mlock = true
    api_addr = "http://127.0.0.1:8200"
    cluster_addr = "http://127.0.0.1:8201"
    listener "tcp" {
      address         = "0.0.0.0:8200"
      cluster_address = "0.0.0.0:8201"
      tls_disable     = true
    }
    storage "raft" {
      path    = "/bao/data"
      node_id = "node-0"
    }
  node-1.hcl: |
    ui = true
    disable_mlock = true
    api_addr = "http://127.0.0.1:8202"
    cluster_addr = "http://127.0.0.1:8203"
    listener "tcp" {
      address         = "0.0.0.0:8202"
      cluster_address = "0.0.0.0:8203"
      tls_disable     = true
    }
    storage "raft" {
      path    = "/bao/data"
      node_id = "node-1"
    }
  node-2.hcl: |
    ui = true
    disable_mlock = true
    api_addr = "http://127.0.0.1:8204"
    cluster_addr = "http://127.0.0.1:8205"
    listener "tcp" {
      address         = "0.0.0.0:8204"
      cluster_address = "0.0.0.0:8205"
      tls_disable     = true
    }
    storage "raft" {
      path    = "/bao/data"
      node_id = "node-2"
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: platform
  labels:
    app: platform
spec:
  restartPolicy: Always
  containers:
    # ═══ OpenBao KMS (3-node Raft) ═══════════════════════════════════
    - name: bao-0
      image: quay.io/openbao/openbao:2.1.0
      command: ["bao", "server", "-config=/config/node-0.hcl"]
      ports:
        - containerPort: 8200
          hostPort: 8200
        - containerPort: 8201
          hostPort: 8201
      env:
        - name: SKIP_CHOWN
          value: "true"
      volumeMounts:
        - name: openbao-config
          mountPath: /config
          readOnly: true
        - name: bao-data-0
          mountPath: /bao/data

    - name: bao-1
      image: quay.io/openbao/openbao:2.1.0
      command: ["bao", "server", "-config=/config/node-1.hcl"]
      ports:
        - containerPort: 8202
          hostPort: 8202
        - containerPort: 8203
          hostPort: 8203
      env:
        - name: SKIP_CHOWN
          value: "true"
      volumeMounts:
        - name: openbao-config
          mountPath: /config
          readOnly: true
        - name: bao-data-1
          mountPath: /bao/data

    - name: bao-2
      image: quay.io/openbao/openbao:2.1.0
      command: ["bao", "server", "-config=/config/node-2.hcl"]
      ports:
        - containerPort: 8204
          hostPort: 8204
        - containerPort: 8205
          hostPort: 8205
      env:
        - name: SKIP_CHOWN
          value: "true"
      volumeMounts:
        - name: openbao-config
          mountPath: /config
          readOnly: true
        - name: bao-data-2
          mountPath: /bao/data

    # ═══ vault-backend (Terraform state HTTP proxy → OpenBao KV v2) ══
    - name: vault-backend
      image: docker.io/gherynos/vault-backend:latest
      ports:
        - containerPort: 8080
          hostPort: 8080
      env:
        - name: VAULT_URL
          value: "http://127.0.0.1:8200"
        - name: VAULT_STORE
          value: "secret"
        - name: VAULT_PREFIX
          value: "tfstate"
        - name: LISTEN_ADDRESS
          value: "0.0.0.0:8080"

    # ═══ Gitea ═══════════════════════════════════════════════════════
    - name: gitea
      image: docker.io/gitea/gitea:1
      ports:
        - containerPort: 3001
          hostPort: 3000
        - containerPort: 2222
          hostPort: 2222
      volumeMounts:
        - name: gitea-data
          mountPath: /data
      env:
        - name: GITEA__server__ROOT_URL
          value: "${CI_GITEA_URL}"
        - name: GITEA__server__DOMAIN
          value: "${CI_DOMAIN}"
        - name: GITEA__server__HTTP_PORT
          value: "3001"
        - name: GITEA__server__SSH_PORT
          value: "2222"
        - name: GITEA__server__SSH_LISTEN_PORT
          value: "2222"
        - name: GITEA__webhook__ALLOWED_HOST_LIST
          value: "loopback,private"
        - name: GITEA__security__INSTALL_LOCK
          value: "true"
        - name: GITEA__database__DB_TYPE
          value: "sqlite3"

    # ═══ Woodpecker server ═══════════════════════════════════════════
    - name: woodpecker-server
      image: docker.io/woodpeckerci/woodpecker-server:latest
      command: ["sh", "-c"]
      args:
        - |
          while [ ! -f /shared/creds.env ]; do sleep 1; done
          . /shared/creds.env
          exec woodpecker-server
      ports:
        - containerPort: 8001
          hostPort: 8000
        - containerPort: 9001
          hostPort: 9000
      volumeMounts:
        - name: woodpecker-data
          mountPath: /var/lib/woodpecker
        - name: shared
          mountPath: /shared
      env:
        - name: WOODPECKER_HOST
          value: "${CI_WP_HOST}"
        - name: WOODPECKER_SERVER_ADDR
          value: ":8001"
        - name: WOODPECKER_GRPC_ADDR
          value: ":9001"
        - name: WOODPECKER_OPEN
          value: "true"
        - name: WOODPECKER_ADMIN
          value: "${CI_ADMIN}"
        - name: WOODPECKER_GITEA
          value: "true"
        - name: WOODPECKER_GITEA_URL
          value: "http://platform-gitea:3001"
        - name: WOODPECKER_DEV_GITEA_OAUTH_URL
          value: "${CI_OAUTH_URL}"
        - name: WOODPECKER_AGENT_SECRET
          value: "${CI_AGENT_SECRET}"

    # ═══ Woodpecker agent ════════════════════════════════════════════
    - name: woodpecker-agent
      image: docker.io/woodpeckerci/woodpecker-agent:latest
      securityContext:
        privileged: true
      volumeMounts:
        - name: podman-sock
          mountPath: /var/run/docker.sock
      env:
        - name: WOODPECKER_SERVER
          value: "platform-woodpecker-server:9001"
        - name: WOODPECKER_BACKEND
          value: "docker"
        - name: WOODPECKER_AGENT_SECRET
          value: "${CI_AGENT_SECRET}"
        - name: WOODPECKER_BACKEND_DOCKER_NETWORK
          value: "podman-default-kube-network"

    # ═══ Setup sidecar ═══════════════════════════════════════════════
    # Single orchestrator: KMS bootstrap + CI setup.
    # Uses Gitea image (has curl, git) + apk add jq.
    - name: setup
      image: docker.io/gitea/gitea:1
      command: ["sh", "-c"]
      args:
        - |
          set -e
          NODE0="http://127.0.0.1:8200"
          NODE1="http://127.0.0.1:8202"
          NODE2="http://127.0.0.1:8204"
          GITEA="http://platform-gitea:3001"
          WP="http://platform-woodpecker-server:8001"
          ADMIN="${CI_ADMIN}"
          PASS="${CI_PASSWORD}"
          WP_EXT="${CI_WP_HOST}"
          OAUTH_EXT="${CI_OAUTH_URL}"
          OUT="/kms-output"

          [ -f /shared/done ] && exec sleep infinity
          apk add --no-cache jq >/dev/null 2>&1 || true

          bao_api() { curl -sf -X "$1" -H "X-Vault-Token: $ROOT_TOKEN" -H "Content-Type: application/json" "$2" ${3:+-d "$3"}; }
          wait_ready() { until curl -so /dev/null -w '%{http_code}' "$1/v1/sys/health" 2>/dev/null | grep -qv 000; do sleep 1; done; }

          # ══════════════ PHASE 1: KMS BOOTSTRAP ══════════════════════
          if [ -f "$OUT/root-token.txt" ]; then
            echo "[setup] KMS already bootstrapped, loading tokens"
            ROOT_TOKEN=$(cat "$OUT/root-token.txt")
            KEY0=$(head -1 "$OUT/unseal-keys.txt")
            KEY1=$(head -2 "$OUT/unseal-keys.txt" | tail -1)
            # Re-unseal (needed after pod restart)
            wait_ready "$NODE0"
            for node in "$NODE0" "$NODE1" "$NODE2"; do
              curl -sf -X PUT "$node/v1/sys/unseal" -d "{\"key\":\"$KEY0\"}" >/dev/null 2>&1 || true
              curl -sf -X PUT "$node/v1/sys/unseal" -d "{\"key\":\"$KEY1\"}" >/dev/null 2>&1 || true
            done
            echo "[setup] Nodes unsealed"
          else
            echo "[setup] === KMS Bootstrap ==="
            wait_ready "$NODE0"
            sleep 2

            # Init Raft
            INIT=$(curl -sf -X PUT "$NODE0/v1/sys/init" -d '{"secret_shares":3,"secret_threshold":2}')
            ROOT_TOKEN=$(echo "$INIT" | jq -r '.root_token')
            KEY0=$(echo "$INIT" | jq -r '.keys[0]')
            KEY1=$(echo "$INIT" | jq -r '.keys[1]')
            echo "$ROOT_TOKEN" > "$OUT/root-token.txt"
            echo "$INIT" | jq -r '.keys[]' > "$OUT/unseal-keys.txt"

            # Unseal node-0
            curl -sf -X PUT "$NODE0/v1/sys/unseal" -d "{\"key\":\"$KEY0\"}" >/dev/null
            curl -sf -X PUT "$NODE0/v1/sys/unseal" -d "{\"key\":\"$KEY1\"}" >/dev/null

            # Join + unseal nodes 1,2
            for node in "$NODE1" "$NODE2"; do
              wait_ready "$node"
              curl -sf -X PUT "$node/v1/sys/storage/raft/join" -d "{\"leader_api_addr\":\"$NODE0\"}" >/dev/null
              curl -sf -X PUT "$node/v1/sys/unseal" -d "{\"key\":\"$KEY0\"}" >/dev/null
              curl -sf -X PUT "$node/v1/sys/unseal" -d "{\"key\":\"$KEY1\"}" >/dev/null
            done
            echo "[setup] Raft cluster ready (3 nodes)"

            # Transit auto-unseal
            bao_api POST "$NODE0/v1/sys/mounts/transit" '{"type":"transit"}' >/dev/null
            bao_api POST "$NODE0/v1/transit/keys/autounseal" '{"type":"aes256-gcm96"}' >/dev/null
            bao_api PUT "$NODE0/v1/sys/policies/acl/autounseal" \
              '{"policy":"path \"transit/encrypt/autounseal\" { capabilities = [\"update\"] }\npath \"transit/decrypt/autounseal\" { capabilities = [\"update\"] }"}' >/dev/null
            TRANSIT_TOKEN=$(bao_api POST "$NODE0/v1/auth/token/create" \
              '{"policies":["autounseal"],"no_parent":true,"period":"768h"}' | jq -r '.auth.client_token')
            echo "$TRANSIT_TOKEN" > "$OUT/transit-token.txt"
            echo "[setup] Transit auto-unseal configured"

            # KV v2 + vault-backend token
            bao_api POST "$NODE0/v1/sys/mounts/secret" '{"type":"kv","options":{"version":"2"}}' >/dev/null
            bao_api PUT "$NODE0/v1/sys/policies/acl/vault-backend" \
              '{"policy":"path \"secret/data/tfstate/*\" { capabilities = [\"create\",\"read\",\"update\"] }\npath \"secret/metadata/tfstate/*\" { capabilities = [\"delete\",\"read\",\"list\"] }"}' >/dev/null
            VB_TOKEN=$(bao_api POST "$NODE0/v1/auth/token/create" \
              '{"policies":["vault-backend"],"no_parent":true,"period":"768h"}' | jq -r '.auth.client_token')
            echo "$VB_TOKEN" > "$OUT/vault-backend-token.txt"
            echo "[setup] KV v2 + vault-backend ready"

            # PKI Root CA
            bao_api POST "$NODE0/v1/sys/mounts/pki" '{"type":"pki","config":{"max_lease_ttl":"87600h"}}' >/dev/null
            ROOT_CA=$(bao_api POST "$NODE0/v1/pki/root/generate/internal" \
              '{"common_name":"Talos Platform Root CA","organization":"Talos Platform","key_type":"ec","key_bits":384,"ttl":"87600h","issuer_name":"root"}')
            echo "$ROOT_CA" | jq -r '.data.certificate' > "$OUT/root-ca.pem"
            echo "[setup] Root CA generated"

            # Sub-CA helper
            gen_sub_ca() {
              local name="$1" cn="$2" mount="$3" domains="$4"
              bao_api POST "$NODE0/v1/sys/mounts/$mount" "{\"type\":\"pki\",\"config\":{\"max_lease_ttl\":\"43800h\"}}" >/dev/null
              local gen=$(bao_api POST "$NODE0/v1/$mount/intermediate/generate/exported" \
                "{\"common_name\":\"$cn\",\"organization\":\"Talos Platform\",\"key_type\":\"ec\",\"key_bits\":384,\"issuer_name\":\"$name\"}")
              echo "$gen" | jq -r '.data.private_key' > "$OUT/${name}-ca-key.pem"
              local csr=$(echo "$gen" | jq -r '.data.csr')
              local signed=$(bao_api POST "$NODE0/v1/pki/root/sign-intermediate" \
                "{\"csr\":$(echo "$csr" | jq -Rs .),\"common_name\":\"$cn\",\"organization\":\"Talos Platform\",\"ttl\":\"43800h\"}")
              echo "$signed" | jq -r '.data.certificate' > "$OUT/${name}-ca.pem"
              cat "$OUT/${name}-ca.pem" "$OUT/root-ca.pem" > "$OUT/${name}-ca-chain.pem"
              bao_api POST "$NODE0/v1/$mount/intermediate/set-signed" \
                "{\"certificate\":$(echo "$signed" | jq -r '.data.certificate + \"\n\" + .data.issuing_ca' | jq -Rs .)}" >/dev/null
              bao_api POST "$NODE0/v1/$mount/roles/default" \
                "{\"allowed_domains\":[$domains],\"allow_subdomains\":true,\"allow_bare_domains\":true,\"max_ttl\":\"8760h\",\"key_type\":\"ec\",\"key_bits\":256}" >/dev/null
              echo "[setup] Sub-CA $name generated"
            }
            gen_sub_ca "infra" "Talos Platform Infra CA" "pki_infra" '"svc.cluster.local","cluster.local","local"'
            gen_sub_ca "app" "Talos Platform App CA" "pki_app" '"svc.cluster.local","local"'
          fi

          # Store CI secrets in OpenBao
          bao_api POST "$NODE0/v1/secret/data/ci" "${CI_SECRETS_JSON}" >/dev/null || true
          echo "[setup] KMS phase complete"

          # ══════════════ PHASE 2: CI SETUP ═══════════════════════════
          echo "[setup] Waiting for Gitea..."
          until curl -sf "$GITEA/api/v1/version" >/dev/null 2>&1; do sleep 2; done
          sleep 3

          # Admin user
          gitea admin user create --admin \
            --username "$ADMIN" --password "$PASS" \
            --email "admin@ci.local" --must-change-password=false \
            --config /data/gitea/conf/app.ini 2>/dev/null || true

          # OAuth app
          for oid in $(curl -sf "$GITEA/api/v1/user/applications/oauth2" \
            -u "$ADMIN:$PASS" | jq -r '.[].id' 2>/dev/null); do
            curl -sf -X DELETE "$GITEA/api/v1/user/applications/oauth2/$oid" -u "$ADMIN:$PASS"
          done
          OAUTH=$(curl -sf -X POST "$GITEA/api/v1/user/applications/oauth2" \
            -u "$ADMIN:$PASS" -H "Content-Type: application/json" \
            -d "{\"name\":\"woodpecker\",\"confidential_client\":true,\"redirect_uris\":[\"$WP_EXT/authorize\"]}")
          echo "export WOODPECKER_GITEA_CLIENT=$(echo "$OAUTH" | jq -r .client_id)"   > /shared/creds.env
          echo "export WOODPECKER_GITEA_SECRET=$(echo "$OAUTH" | jq -r .client_secret)" >> /shared/creds.env

          # Wait for WP
          echo "[setup] Waiting for Woodpecker..."
          until curl -sf "$WP/healthz" >/dev/null 2>&1; do sleep 2; done
          sleep 2

          # OAuth dance → WP token
          echo "[setup] OAuth dance"
          CSRF=$(curl -sc /tmp/gc "$GITEA/user/login" | grep '_csrf' | grep -o 'value="[^"]*"' | head -1 | cut -d'"' -f2)
          curl -sb /tmp/gc -c /tmp/gc -L "$GITEA/user/login" \
            --data-urlencode "_csrf=$CSRF" -d "user_name=$ADMIN&password=$PASS" -o /dev/null

          WP_REDIR=$(curl -sfD - "$WP/authorize" -o /dev/null | grep -i '^location:' | sed 's/[Ll]ocation: //' | tr -d '\r\n')
          INT_REDIR=$(echo "$WP_REDIR" | sed "s|$OAUTH_EXT|$GITEA|")
          curl -sb /tmp/gc -c /tmp/gc -D /tmp/ah.txt "$INT_REDIR" -o /tmp/auth.html
          AUTH_LOC=$(grep -i '^location:' /tmp/ah.txt 2>/dev/null | head -1 | sed 's/[Ll]ocation: //' | tr -d '\r\n')

          if [ -z "$AUTH_LOC" ]; then
            CSRF2=$(grep '_csrf' /tmp/auth.html | grep -o 'value="[^"]*"' | tail -1 | cut -d'"' -f2)
            CID=$(grep 'client_id' /tmp/auth.html | grep -o 'value="[^"]*"' | cut -d'"' -f2)
            STATE=$(grep 'name="state"' /tmp/auth.html | grep -o 'value="[^"]*"' | cut -d'"' -f2)
            RURI=$(grep 'redirect_uri' /tmp/auth.html | grep -o 'value="[^"]*"' | cut -d'"' -f2)
            AUTH_LOC=$(curl -sb /tmp/gc -c /tmp/gc -D - "$GITEA/login/oauth/grant" \
              --data-urlencode "_csrf=$CSRF2" --data-urlencode "client_id=$CID" \
              --data-urlencode "state=$STATE" --data-urlencode "redirect_uri=$RURI" \
              -d 'scope=&nonce=&granted=true' -o /dev/null \
              | grep -i '^location:' | head -1 | sed 's/[Ll]ocation: //' | tr -d '\r\n')
          fi

          INT_CB=$(echo "$AUTH_LOC" | sed "s|$WP_EXT|$WP|")
          curl -sc /tmp/wc -L "$INT_CB" -o /dev/null
          WP_JWT=$(grep user_sess /tmp/wc | awk '{print $NF}')
          WP_CSRF=$(curl -s -b "user_sess=$WP_JWT" "$WP/web-config.js" | grep -o 'WOODPECKER_CSRF = "[^"]*"' | cut -d'"' -f2)
          WP_TOKEN=$(curl -sf -b /tmp/wc -X POST "$WP/api/user/token" -H "X-CSRF-TOKEN: $WP_CSRF")

          # Push code
          echo "[setup] Pushing code"
          curl -sf -X POST "$GITEA/api/v1/user/repos" \
            -u "$ADMIN:$PASS" -H "Content-Type: application/json" \
            -d '{"name":"talos","private":false}' >/dev/null || true
          cd /tmp
          if [ -d /source/.git ]; then git clone /source talos-push 2>/dev/null
          else git clone "${CI_GIT_REPO_URL}" talos-push 2>/dev/null; fi
          cd talos-push
          git remote add gitea "http://$ADMIN:$PASS@platform-gitea:3001/$ADMIN/talos.git" 2>/dev/null || true
          git push gitea main --force 2>&1 | tail -2

          # Activate repo + patch webhook
          echo "[setup] Activating repo"
          curl -sf -X POST "$WP/api/repos?forge_remote_id=1" -H "Authorization: Bearer $WP_TOKEN" || true
          sleep 1
          HOOKS=$(curl -sf "$GITEA/api/v1/repos/$ADMIN/talos/hooks" -u "$ADMIN:$PASS")
          HOOK_ID=$(echo "$HOOKS" | jq -r '.[-1].id')
          HOOK_URL=$(echo "$HOOKS" | jq -r '.[-1].config.url')
          HOOK_TOKEN=$(echo "$HOOK_URL" | sed 's/.*access_token=//')
          curl -sf -X PATCH "$GITEA/api/v1/repos/$ADMIN/talos/hooks/$HOOK_ID" \
            -u "$ADMIN:$PASS" -H "Content-Type: application/json" \
            -d "{\"config\":{\"url\":\"http://platform-woodpecker-server:8001/api/hook?access_token=$HOOK_TOKEN\",\"content_type\":\"json\"}}" >/dev/null

          # Create WP secrets
          echo "[setup] Creating WP secrets"
          VB_TOKEN=$(cat "$OUT/vault-backend-token.txt")
          for pair in \
            "scw_project_id:${CI_SCW_PROJECT_ID}" \
            "scw_image_access_key:${CI_SCW_IMAGE_ACCESS_KEY}" \
            "scw_image_secret_key:${CI_SCW_IMAGE_SECRET_KEY}" \
            "scw_cluster_access_key:${CI_SCW_CLUSTER_ACCESS_KEY}" \
            "scw_cluster_secret_key:${CI_SCW_CLUSTER_SECRET_KEY}" \
            "tf_http_password:$VB_TOKEN"; do
            key="${pair%%:*}"
            value="${pair#*:}"
            curl -sf -X POST "$WP/api/repos/1/secrets" \
              -H "Authorization: Bearer $WP_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$key\",\"value\":\"$value\",\"events\":[\"push\"]}" >/dev/null && echo "  $key" || true
          done

          touch /shared/done
          echo "[setup] === Platform ready ==="
          exec sleep infinity
      volumeMounts:
        - name: gitea-data
          mountPath: /data
        - name: shared
          mountPath: /shared
        - name: source
          mountPath: /source
          readOnly: true
        - name: kms-output
          mountPath: /kms-output

  volumes:
    - name: openbao-config
      configMap:
        name: openbao-config
    - name: bao-data-0
      emptyDir: {}
    - name: bao-data-1
      emptyDir: {}
    - name: bao-data-2
      emptyDir: {}
    - name: gitea-data
      hostPath:
        path: ${CI_GITEA_DATA_DIR}
        type: DirectoryOrCreate
    - name: woodpecker-data
      hostPath:
        path: ${CI_WP_DATA_DIR}
        type: DirectoryOrCreate
    - name: podman-sock
      hostPath:
        path: ${CI_PODMAN_SOCK}
        type: Socket
    - name: shared
      emptyDir: {}
    - name: source
      hostPath:
        path: ${CI_SOURCE_DIR}
        type: Directory
    - name: kms-output
      hostPath:
        path: ${CI_KMS_DIR}
        type: DirectoryOrCreate
