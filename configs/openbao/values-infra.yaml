# OpenBao Infra — PKI backend + infrastructure secrets
# Standalone mode with file storage
# Init handled automatically by openbao-init K8s Job (in k8s-pki stack)

server:
  dev:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable     = true
        address         = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/openbao/data"
      }

      # Production: transit auto-unseal from external KMS
      # seal "transit" {
      #   address    = "https://kms.example.com:8200"
      #   token      = "s.xxxxx"
      #   key_name   = "autounseal"
      #   mount_path = "transit/"
      # }

  dataStorage:
    enabled: true
    size: 1Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: true
  replicas: 1
  agentImage:
    registry: "quay.io"
    repository: "openbao/openbao"
  agentDefaults:
    cpuRequest: "50m"
    cpuLimit: "250m"
    memRequest: "64Mi"
    memLimit: "128Mi"
  webhook:
    failurePolicy: Ignore

csi:
  enabled: false

ui:
  enabled: true
