# OpenBao Infra — PKI + infrastructure secrets
# Dev mode for POC (no persistence, no unseal)

server:
  dev:
    enabled: true
    devRootToken: "${root_token}"

  standalone:
    enabled: true

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: false

csi:
  enabled: false

ui:
  enabled: true
