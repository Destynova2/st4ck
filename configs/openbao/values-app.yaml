# OpenBao App — application secrets
# Standalone mode with file storage (init required after first deploy)
#
# After deploy: make openbao-init

server:
  dev:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable     = true
        address         = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/openbao/data"
      }

      # Production: transit auto-unseal from external KMS
      # seal "transit" {
      #   address    = "https://kms.example.com:8200"
      #   token      = "s.xxxxx"
      #   key_name   = "autounseal"
      #   mount_path = "transit/"
      # }

  dataStorage:
    enabled: true
    size: 1Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: false

csi:
  enabled: false

ui:
  enabled: true
