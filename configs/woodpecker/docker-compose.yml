services:
  gitea:
    image: gitea/gitea:1
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./gitea-data:/data
    environment:
      - GITEA__server__ROOT_URL=${GITEA_URL}
      - GITEA__server__DOMAIN=${GITEA_DOMAIN}
      - GITEA__webhook__ALLOWED_HOST_LIST=private

  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v2
    restart: unless-stopped
    depends_on:
      - gitea
    ports:
      - "8000:8000"
    volumes:
      - ./woodpecker-data:/var/lib/woodpecker
    environment:
      - WOODPECKER_HOST=${WOODPECKER_HOST}
      - WOODPECKER_OPEN=true
      - WOODPECKER_ADMIN=${GITEA_ADMIN_USER}
      - WOODPECKER_GITEA=true
      - WOODPECKER_GITEA_URL=${GITEA_URL}
      - WOODPECKER_GITEA_CLIENT=${WOODPECKER_GITEA_CLIENT}
      - WOODPECKER_GITEA_SECRET=${WOODPECKER_GITEA_SECRET}
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v2
    restart: unless-stopped
    depends_on:
      - woodpecker-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WOODPECKER_SERVER=woodpecker-server:9000
      - WOODPECKER_BACKEND=docker
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}
