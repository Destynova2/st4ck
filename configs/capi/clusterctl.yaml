# clusterctl configuration for CAPI providers
# Used by `clusterctl init` to install providers on the management cluster

providers:
  - name: "talos"
    url: "https://github.com/siderolabs/cluster-api-bootstrap-provider-talos/releases/v0.6.11/bootstrap-components.yaml"
    type: "BootstrapProvider"
  - name: "talos"
    url: "https://github.com/siderolabs/cluster-api-control-plane-provider-talos/releases/v0.5.12/control-plane-components.yaml"
    type: "ControlPlaneProvider"
  - name: "scaleway"
    url: "https://github.com/scaleway/cluster-api-provider-scaleway/releases/v0.2.0/infrastructure-components.yaml"
    type: "InfrastructureProvider"
