# TopoLVM — LVM-based CSI storage provisioner
# Topology-aware volume provisioning

storageClasses:
  - name: topolvm-provisioner
    storageClass:
      isDefaultClass: false
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
      reclaimPolicy: Delete
      fstype: xfs

lvmd:
  managed: true
  deviceClasses:
    - name: default
      default: true
      volumeGroup: myvg1
      spareGb: 5

controller:
  replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi
