# Kyverno — Kubernetes policy engine
# Validates, mutates, and generates resources

replicaCount: 1

# Ignore webhook failures so Kyverno being down doesn't block all deployments
admissionController:
  replicas: 1
  container:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 384Mi
  webhookConfiguration:
    failurePolicy: Ignore

backgroundController:
  replicas: 1

cleanupController:
  replicas: 1

reportsController:
  replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 384Mi
