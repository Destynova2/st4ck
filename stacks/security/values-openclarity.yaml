# OpenClarity — multi-scanner vulnerability + SBOM platform
# https://openclarity.io/  (Linux Foundation / OpenSSF)
#
# Continuous discovery of in-cluster images + parallel scan with Trivy +
# Grype + Syft. Findings are deduped and exposed via UI/API backed by
# Postgres.
#
# Why both Trivy operator AND OpenClarity (transient): Trivy operator
# emits CR-based VulnerabilityReport (consumed by Polaris/kube-bench),
# OpenClarity gives the multi-scanner view + UI. Migration tracked in
# ADR-027.

# ─── Discovery: which images to scan ────────────────────────────────
discovery:
  # Scan every image found in any pod across the cluster.
  scope: cluster
  # Re-discover every 6h (cluster image set is mostly stable post-deploy)
  intervalSeconds: 21600

# ─── Scanners ────────────────────────────────────────────────────────
scanners:
  vulnerability:
    enabled: true
    scanners:
      - trivy
      - grype
  sbom:
    enabled: true
    scanners:
      - syft
  secret:
    enabled: false  # Trivy operator already handles secret scanning

# ─── Backend (UI + API + Postgres) ──────────────────────────────────
ui:
  enabled: true
  service:
    type: ClusterIP

apiserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Database: use external CNPG cluster (openclarity-pg) instead of the
# chart's bundled Bitnami postgres (paywall post-Aug-2025) or SQLite
# (no concurrent writes, harder backup). The credentials secret is
# re-keyed by stacks/security/main.tf from CNPG's openclarity-pg-app.
apiserver:
  database:
    postgresql:
      enabled: false
    sqlite:
      enabled: false
    externalPostgresql:
      enabled: true
      host: openclarity-pg-rw.security.svc.cluster.local
      port: 5432
      sslMode: disable                       # CNPG accepts plain TCP on the rw service
      auth:
        existingSecret: openclarity-pg-credentials  # keys: username, password, database

# Disable the bundled Bitnami postgres subchart.
postgresql:
  enabled: false

# Orchestrator: scan in-cluster pods (default chart preset = AWS EC2 scanning).
# - provider: kubernetes  → drops the AWS provider that requires Region etc.
# - serviceAccount.create=true: chart's clusterrole.yaml template attaches
#   the cluster-wide pod discovery RBAC to the SA (without create=true the
#   binding is skipped and orchestrator can't list pods to scan).
# - kubernetes.{}: defaults to .Release.Namespace for both
#   ContainerRuntimeDiscovery + Scanner (we deploy in `security`).
orchestrator:
  provider: kubernetes
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  kubernetes: {}

# Disable the Container Runtime Discovery server. It uses containers-tools
# which requires writing to /etc/containers — incompatible with Talos's
# read-only root filesystem (security feature, not a bug).
#
# We don't need it: orchestrator with provider=kubernetes already discovers
# images via the K8s API (looking at every pod's spec.containers[*].image),
# which doesn't need to talk to the CRI on the host. cr-discovery only
# adds value on bare-metal/VM where the K8s API is missing context.
crDiscoveryServer:
  enabled: false

# ─── Scanner job resources ───────────────────────────────────────────
scannerJobs:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi  # Grype DB can grow ~1GB
  ttlSecondsAfterFinished: 300

# Use a shared PVC across scanner jobs to avoid each scan re-downloading
# the Trivy/Grype DB (~500MB-1GB each). Requires RWO since only one job
# runs at a time per scanner type.
sharedCache:
  enabled: true
  storageClass: local-path
  size: 5Gi
