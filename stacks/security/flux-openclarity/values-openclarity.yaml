# OpenClarity — multi-scanner vulnerability + SBOM platform
# https://openclarity.io/  (Linux Foundation / OpenSSF)
#
# Continuous discovery of in-cluster images + parallel scan with Trivy +
# Grype + Syft. Findings are deduped and exposed via UI/API backed by
# Postgres.
#
# Why both Trivy operator AND OpenClarity (transient): Trivy operator
# emits CR-based VulnerabilityReport (consumed by Polaris/kube-bench),
# OpenClarity gives the multi-scanner view + UI. Migration tracked in
# ADR-027.

# ─── Discovery: which images to scan ────────────────────────────────
discovery:
  # Scan every image found in any pod across the cluster.
  scope: cluster
  # Re-discover every 6h (cluster image set is mostly stable post-deploy)
  intervalSeconds: 21600

# ─── Scanners ────────────────────────────────────────────────────────
scanners:
  vulnerability:
    enabled: true
    scanners:
      - trivy
      - grype
  sbom:
    enabled: true
    scanners:
      - syft
  secret:
    enabled: false  # Trivy operator already handles secret scanning

# ─── Backend (UI + API + Postgres) ──────────────────────────────────
# Every chart sub-component below needs an explicit limits.cpu — without
# it, the security namespace LimitRange (default cpu: "1") fills in 1 CPU
# per container and exhausts security-scan-quota before scan jobs start.
# Postmortem 2026-04-29 (rebuild quota audit).
ui:
  enabled: true
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Database: use external CNPG cluster (openclarity-pg) instead of the
# chart's bundled Bitnami postgres (paywall post-Aug-2025) or SQLite
# (no concurrent writes, harder backup). The credentials secret is
# re-keyed by stacks/security/main.tf from CNPG's openclarity-pg-app.
#
# NOTE: previously this file had TWO `apiserver:` blocks — YAML last-wins
# silently dropped the first block's `replicaCount` and `resources`.
# Consolidated into one block here. Postmortem 2026-04-29.
apiserver:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    postgresql:
      enabled: false
    sqlite:
      enabled: false
    externalPostgresql:
      enabled: true
      host: openclarity-pg-rw.security.svc.cluster.local
      port: 5432
      sslMode: disable                       # CNPG accepts plain TCP on the rw service
      auth:
        existingSecret: openclarity-pg-credentials  # keys: username, password, database

# Disable the bundled Bitnami postgres subchart.
postgresql:
  enabled: false

# Orchestrator: scan in-cluster pods (default chart preset = AWS EC2 scanning).
# - provider: kubernetes  → drops the AWS provider that requires Region etc.
# - serviceAccount.create=true: chart's clusterrole.yaml template attaches
#   the cluster-wide pod discovery RBAC to the SA (without create=true the
#   binding is skipped and orchestrator can't list pods to scan).
# - kubernetes.{}: defaults to .Release.Namespace for both
#   ContainerRuntimeDiscovery + Scanner (we deploy in `security`).
orchestrator:
  provider: kubernetes
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  kubernetes: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Container Runtime Discovery DaemonSet — incompatible with Talos's
# read-only root filesystem (it writes to /etc/containers; that's a
# security feature of Talos, not a bug we should bypass with emptyDir).
#
# We don't need it: orchestrator with provider=kubernetes already
# discovers images via the K8s API (every pod's spec.containers[*].image),
# which doesn't talk to the CRI on the host. cr-discovery only adds
# value on bare-metal/VM where K8s context is missing.
#
# The chart has NO `crDiscoveryServer.enabled` toggle — the DaemonSet
# template is gated only by `eq .Values.orchestrator.provider "kubernetes"`.
# Cleanest non-fork workaround: schedule it on no nodes via an unsatisfiable
# nodeSelector. The DS still exists in the API but stays at 0 ready pods,
# never tries to mount /etc/containers, and never enters CreateContainerError.
crDiscoveryServer:
  nodeSelector:
    st4ck.io/disable-cr-discovery: "true"

# ─── Scanner job resources ───────────────────────────────────────────
# limits.cpu REQUIRED by security-scan-quota (postmortem 2026-04-29).
scannerJobs:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi  # Grype DB can grow ~1GB
  ttlSecondsAfterFinished: 300

# Use a shared PVC across scanner jobs to avoid each scan re-downloading
# the Trivy/Grype DB (~500MB-1GB each). Requires RWO since only one job
# runs at a time per scanner type.
sharedCache:
  enabled: true
  storageClass: local-path
  size: 5Gi
