# Kyverno ClusterPolicy — enforce ECDSA on cert-manager Certificate CRs
#
# Cert-manager defaults to RSA-2048 when Certificate.spec.privateKey is
# absent. Cilium's hubble.tls.auto.method=certmanager creates Certificate
# CRs without privateKey block (no override exposed in the chart) → all
# hubble TLS = RSA, breaking the strict ECDSA-only constraint on our
# main `cluster-issuer` PKI role.
#
# This mutate policy auto-fills privateKey={algorithm: ECDSA, size: 256}
# on any Certificate CR without an explicit algorithm. Result:
#   - Cilium hubble certs become ECDSA → can use `cluster-issuer` instead
#     of the cilium-hubble RSA-tolerating role
#   - Future operators that don't expose privateKey config inherit ECDSA
#     by default → cluster-wide single-algorithm guarantee
#   - Certificate CRs WITH explicit algorithm (our manually-written ones)
#     are not touched (Kyverno mutate only adds, never overwrites
#     existing fields).
#
# ADR-028 wave 4 follow-up.

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-ecdsa-default-certs
  annotations:
    policies.kyverno.io/title: Enforce ECDSA on Certificate CRs
    policies.kyverno.io/category: PKI Hygiene
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Auto-fill privateKey.algorithm=ECDSA + size=256 on any cert-manager
      Certificate that doesn't specify them. Lets us run a strict
      ECDSA-only PKI role on internal-ca while still supporting Helm
      charts (Cilium, etc.) that don't expose private key config.
spec:
  background: false  # mutate-on-create, not retroactive
  rules:
    - name: default-ecdsa-256
      match:
        any:
          - resources:
              kinds:
                - cert-manager.io/v1/Certificate
      mutate:
        # Strategic merge with conditional anchor `+(field)` —
        # adds the field only when ABSENT in the source manifest.
        # Won't overwrite manually-set algorithms (RSA on legacy charts
        # that someone explicitly wants).
        patchStrategicMerge:
          spec:
            +(privateKey):
              algorithm: ECDSA
              size: 256
