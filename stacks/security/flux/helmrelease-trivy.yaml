apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: trivy-operator
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: aquasecurity
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: trivy-values
      valuesKey: values.yaml
      optional: false
