# OpenClarity Postgres credentials (Phase 1a-3)
#
# Pattern B from the audit (matches identity-pg in stacks/identity/flux/
# external-secrets-kratos.yaml): CNPG owns the password lifecycle, ESO
# PushSecret mirrors it into OpenBao so OpenBao remains the single source
# of truth for downstream consumers (auditability + future rotation
# without Tofu re-apply).
#
# Flow:
#   openclarity-pg-app (CNPG-managed Secret in `security`)
#     │
#     │  PushSecret openclarity-pg-mirror
#     ▼
#   secret/security/db/openclarity (OpenBao KV v2)
#     │  ⇧ writeable by ESO via the `secret/data/*/db/*` clause of the
#     │    eso-readonly policy (no separate policy needed)
#     │
#     │  ExternalSecret openclarity-pg-credentials
#     ▼
#   Secret openclarity-pg-credentials  ← chart externalPostgresql.auth.existingSecret
#     keys: username, password, database
#
# Why `database` is templated literally instead of read from CNPG: the
# CNPG cluster's bootstrap.initdb.database is "openclarity", but the
# CNPG Secret itself doesn't expose the dbname under the same key name
# OpenClarity wants ("database" vs "dbname"). Hardcoding here keeps the
# ExternalSecret schema independent of CNPG conventions.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: openclarity-pg-mirror
  namespace: security
spec:
  # Re-push every 1h. Idempotent: ESO only writes on diff so this is
  # cheap. Bootstrap-friendly: the very first push happens within ~30s
  # of CR creation regardless of refreshInterval.
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao-infra
      kind: ClusterSecretStore
  selector:
    secret:
      # CNPG creates this Secret in the same namespace (no SecretStore
      # required — PushSecret reads K8s Secrets natively).
      name: openclarity-pg-app
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: security/db/openclarity
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: security/db/openclarity
          property: password
    - match:
        secretKey: host
        remoteRef:
          remoteKey: security/db/openclarity
          property: host
    - match:
        secretKey: port
        remoteRef:
          remoteKey: security/db/openclarity
          property: port
    - match:
        # CNPG calls it `dbname`; OpenBao stores it under `dbname` too
        # (the OpenClarity-friendly `database` rename happens at template
        # time in the ExternalSecret below).
        secretKey: dbname
        remoteRef:
          remoteKey: security/db/openclarity
          property: dbname
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclarity-pg-credentials
  namespace: security
spec:
  # Short refresh during the bootstrap window so day-1 is reliable —
  # PushSecret + this ES are applied in the same Tofu plan, so the
  # source path may not exist for the first 5-10s. 30s = at most one
  # short retry before the HelmRelease's depends_on releases.
  refreshInterval: 30s
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: openclarity-pg-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        # Hardcoded "openclarity" — see header comment for rationale.
        # Matches bootstrap.initdb.database in the CNPG Cluster spec.
        database: "openclarity"
  data:
    - secretKey: username
      remoteRef:
        key: security/db/openclarity
        property: username
    - secretKey: password
      remoteRef:
        key: security/db/openclarity
        property: password
