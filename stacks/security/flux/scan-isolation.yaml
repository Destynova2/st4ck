---
# ═══════════════════════════════════════════════════════════════════════
# Scan workload isolation (Phase 1b-5, postmortem 2026-04-27)
# ═══════════════════════════════════════════════════════════════════════
#
# Trivy/OpenClarity scan Jobs spin up dozens of short-lived pods that
# decompress large container images into /tmp (emptyDir tmpfs). Without
# isolation:
#   - aggregate scan memory can starve application workloads on the same
#     node (e.g. a Trivy scan of grafana 12.x extracts ~1.5Gi, jenkins ~2Gi)
#   - a Trivy bug → CrashLoopBackOff with no node eviction → blocks rescans
#   - per-namespace scan jobs accumulate without backpressure
#
# This file adds two cluster-wide guardrails:
#   1. PriorityClass `scan-jobs-low` — kubelet evicts these pods FIRST
#      under node pressure (preserve API server, CNI, application pods)
#   2. ResourceQuota on `security` ns — hard cap on aggregate scan
#      footprint (CPU + memory + pod count). Prevents runaway scan loops.

apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: scan-jobs-low
  labels:
    app.kubernetes.io/component: scan-isolation
value: -100  # negative = lower than default (0); evicted first
globalDefault: false
preemptionPolicy: Never  # never preempt other pods
description: >-
  For Trivy/OpenClarity scan Jobs. Negative priority so kubelet evicts
  these pods FIRST under node pressure (CPU/memory/disk). Set on Trivy
  scan Jobs via operator.scanJobPriorityClassName in values-trivy.yaml.

---
# LimitRange auto-fills resource limits/requests for any pod in this ns
# that doesn't specify them. WITHOUT this, a ResourceQuota with
# limits.cpu/memory hard caps would REJECT every pod missing those
# fields (CNPG postgres + OpenClarity sub-charts + many helm charts
# don't set defaults). Postmortem 2026-04-28.
apiVersion: v1
kind: LimitRange
metadata:
  name: security-defaults
  namespace: security
  labels:
    app.kubernetes.io/component: scan-isolation
spec:
  limits:
    - type: Container
      # default = limit applied when only request specified or missing.
      # Bumped to 1Gi: ClamAV (freshclam-mirror) needs ~700MB to load
      # the full virus DB into memory, OOM-killed at 512Mi.
      default:
        cpu: "1"
        memory: "1Gi"
      # defaultRequest = request applied when no request specified
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: security-scan-quota
  namespace: security
  labels:
    app.kubernetes.io/component: scan-isolation
spec:
  hard:
    # Aggregate cap across ALL pods in security ns. Sized for the realistic
    # toolchain footprint on a ~6-worker dev cluster:
    #   Tetragon DaemonSet  ~3 CPU (6 nodes * 500m)
    #   Kyverno controllers ~2 CPU (4 ctrl * 500m, plus admission peaks)
    #   OpenClarity         ~3 CPU (apiserver + ui + orchestrator + cnpg)
    #   Trivy operator      ~1.5 CPU (operator + trivy-server)
    #   Active scan jobs    ~6 CPU (concurrentScanJobsLimit=2 * ~2 CPU each)
    #   Headroom for spikes / retries / postgres workers ~5 CPU
    #   ─────────────────────────────────────────────────────
    #   Total minimum       ~28 CPU; quota=48 gives ~70% margin.
    #
    # Postmortem 2026-04-29: previous cap of 32 was sized for trivy scan
    # jobs in isolation — when the security ns also hosts the toolchain
    # (kyverno + tetragon + openclarity + trivy + scan jobs) the
    # LimitRange default cpu: "1" applied to containers without explicit
    # limits exhausted the quota before scans could start.
    # Pair with explicit limits.cpu in values-tetragon, values-kyverno,
    # values-openclarity, values-trivy.
    requests.cpu: "20"
    requests.memory: "48Gi"
    limits.cpu: "48"
    limits.memory: "96Gi"
    # Cap concurrent pods so a runaway scan loop can't fork-bomb the ns.
    pods: "150"
    # Cap PVCs (Trivy server PVC + openclarity-pg + maybe future scanners).
    persistentvolumeclaims: "20"
