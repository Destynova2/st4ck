# Kyverno ClusterPolicy — verify container image signatures (Cosign)
# Mode: enforce — images from Harbor must be signed
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/description: >-
      Verify that container images are signed with Cosign.
      Images from the internal Harbor registry must be signed.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-harbor-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "harbor.storage.svc.cluster.local/*"
          mutateDigest: false
          attestors:
            - entries:
                - keys:
                    # Kyverno v1.17 ClusterPolicy CRD: the Secret MUST
                    # contain a key literally named `cosign.pub`. There
                    # is no `key:` field on the schema (validated against
                    # crd .spec.rules.verifyImages.attestors.entries.keys
                    # which only allows {ctlog, kms, publicKeys, rekor,
                    # secret, signatureAlgorithm}). Older policy revs
                    # had a custom `key:` here — schema rejected it
                    # under server-side dry-run, so removed.
                    secret:
                      name: cosign-public-key
                      namespace: security
                    signatureAlgorithm: sha256
