# Cosign keypair (Phase 1a-1) — sourced from OpenBao path
# secret/security/cosign which is seeded by Tofu in
# stacks/pki/secrets.tf (terraform_data.seed_openbao_secrets).
#
# Two ExternalSecret resources because Kyverno's verifyImages reads
# `cosign-public-key` while ad-hoc signing CronJobs read
# `cosign-private-key`. Splitting them keeps the public key Secret
# mountable by every namespace that needs it without ever exposing the
# private key.
#
# Note: both ESes target a Secret of the SAME name as themselves. The
# `data[].secretKey` is what becomes the key INSIDE the K8s Secret;
# `remoteRef.property` selects which OpenBao field to read.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cosign-public-key
  namespace: security
spec:
  # Cosign keys never rotate (would invalidate every existing signature
  # → cluster-wide outage via Kyverno enforce). 1h refresh is fine — it
  # only matters during day-1 when the OpenBao seed lands a few seconds
  # after the ExternalSecret CR is applied.
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: cosign-public-key
    creationPolicy: Owner
  data:
    # Verify-images.yaml policy expects the file literally named
    # `cosign.pub` inside the Secret — we keep that exact key name.
    - secretKey: cosign.pub
      remoteRef:
        key: security/cosign
        property: cosign.pub
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cosign-private-key
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: cosign-private-key
    creationPolicy: Owner
  data:
    - secretKey: cosign.key
      remoteRef:
        key: security/cosign
        property: cosign.key
