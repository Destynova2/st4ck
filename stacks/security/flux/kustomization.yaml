apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# See stacks/cni/flux/kustomization.yaml for the configMapGenerator pattern
# rationale (single source of truth for tofu + Flux).
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease-trivy.yaml
  - helmrelease-tetragon.yaml
  - helmrelease-kyverno.yaml
  - cosign-policy.yaml
  - external-secret-cosign.yaml
  # Phase 1b-5: scan workload isolation (PriorityClass + ResourceQuota).
  # Postmortem 2026-04-27 — Trivy OOM on grafana scan + lack of cap on
  # aggregate scan footprint. Belt-and-suspenders alongside per-job
  # memory limits in values-trivy.yaml.
  - scan-isolation.yaml
  #
  # NOTE: OpenClarity HelmRelease + its ESO/cert pipeline split into
  #   ../flux-openclarity-eso/   (PushSecret + ExternalSecret + 4 CNPG certs)
  #   ../flux-openclarity/       (HelmRelease + values configmap)
  # wired by clusters/management/security-openclarity.yaml as two Flux
  # Kustomizations (security-openclarity dependsOn security-openclarity-eso).
  # Why split: HelmRelease.spec.dependsOn only accepts other HelmReleases
  # (no Kind discriminator). The chart needs the openclarity-pg-credentials
  # Secret (rendered by ESO) at install time, so we gate the install on
  # the ESO pipeline reaching Ready via Kustomization-level dependsOn.
configMapGenerator:
  - name: trivy-values
    namespace: security
    files:
      - values.yaml=values-trivy.yaml
  - name: tetragon-values
    namespace: security
    files:
      - values.yaml=values-tetragon.yaml
  - name: kyverno-values
    namespace: security
    files:
      - values.yaml=values-kyverno.yaml
generatorOptions:
  disableNameSuffixHash: true
