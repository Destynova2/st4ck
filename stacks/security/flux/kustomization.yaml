apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# See stacks/cni/flux/kustomization.yaml for the configMapGenerator pattern
# rationale (single source of truth for tofu + Flux).
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease-trivy.yaml
  - helmrelease-tetragon.yaml
  - helmrelease-kyverno.yaml
  # ADR-028 wave 2: OpenClarity now Flux-owned via OCIRepository.
  - helmrelease-openclarity.yaml
  - cosign-policy.yaml
  # ADR-028 wave 4 — auto-fill privateKey=ECDSA on Certificate CRs
  # missing it (Cilium hubble + future operators that hardcode RSA).
  - enforce-ecdsa-policy.yaml
  # Phase 1a-1: cosign keypair sourced from OpenBao secret/security/cosign
  # (seeded by the pki stack). Two ExternalSecret docs in one file.
  - external-secret-cosign.yaml
  # Phase 1a-3: openclarity-pg credentials. PushSecret mirrors CNPG's
  # openclarity-pg-app into OpenBao at secret/security/db/openclarity,
  # then ExternalSecret renders the chart-shaped Secret OpenClarity reads.
  - external-secrets-openclarity.yaml
  # Phase 1b-3: CNPG external certs (4 per cluster, OpenBao PKI signed)
  - openclarity-pg-certs.yaml
  # Phase 1b-5: scan workload isolation (PriorityClass + ResourceQuota).
  # Postmortem 2026-04-27 — Trivy OOM on grafana scan + lack of cap on
  # aggregate scan footprint. Belt-and-suspenders alongside per-job
  # memory limits in values-trivy.yaml.
  - scan-isolation.yaml
configMapGenerator:
  - name: trivy-values
    namespace: security
    files:
      - values.yaml=values-trivy.yaml
  - name: tetragon-values
    namespace: security
    files:
      - values.yaml=values-tetragon.yaml
  - name: kyverno-values
    namespace: security
    files:
      - values.yaml=values-kyverno.yaml
  - name: openclarity-values
    namespace: security
    files:
      - values.yaml=values-openclarity.yaml
generatorOptions:
  disableNameSuffixHash: true
