# Kyverno — Kubernetes policy engine
# Validates, mutates, and generates resources

replicaCount: 1


# Fail-closed: if Kyverno is down, block admission to prevent policy bypass
admissionController:
  replicas: 1
  container:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 384Mi
  webhookConfiguration:
    failurePolicy: Fail

backgroundController:
  replicas: 1

cleanupController:
  replicas: 1

reportsController:
  replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 384Mi
