apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secrets
  namespace: garage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: garage-secrets
    template:
      engineVersion: v2
      data:
        values.yaml: |
          garage:
            rpcSecret: {{ .rpc_secret }}
            admin:
              token: {{ .admin_token }}
  data:
    - secretKey: rpc_secret
      remoteRef:
        key: storage/garage
        property: rpc_secret
    - secretKey: admin_token
      remoteRef:
        key: storage/garage
        property: admin_token
# NOTE: harbor-s3-mirror PushSecret + harbor-secrets ExternalSecret were
# moved to ../flux-harbor-eso/external-secrets-harbor.yaml so the harbor
# HelmRelease can gate on them via a Flux Kustomization wrapper.
