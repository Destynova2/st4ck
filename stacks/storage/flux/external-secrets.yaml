apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secrets
  namespace: garage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: garage-secrets
    template:
      engineVersion: v2
      data:
        values.yaml: |
          garage:
            rpcSecret: {{ .rpc_secret }}
            admin:
              token: {{ .admin_token }}
  data:
    - secretKey: rpc_secret
      remoteRef:
        key: storage/garage
        property: rpc_secret
    - secretKey: admin_token
      remoteRef:
        key: storage/garage
        property: admin_token
---
# PushSecret mirrors the K8s Secret harbor-s3-credentials (created by
# the garage_buckets_keys terraform_data — Garage CLI generates the API
# key at bootstrap) into OpenBao at secret/storage/harbor-s3, so the
# downstream harbor-secrets ExternalSecret can include the S3 keys in
# its values.yaml fragment alongside admin_password.
# Pattern same as openclarity-pg-mirror in stacks/security/flux/.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-s3-mirror
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao-infra
      kind: ClusterSecretStore
  selector:
    secret:
      name: harbor-s3-credentials
  data:
    - match:
        secretKey: access_key
        remoteRef:
          remoteKey: storage/harbor-s3
          property: access_key
    - match:
        secretKey: secret_key
        remoteRef:
          remoteKey: storage/harbor-s3
          property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-secrets
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: harbor-secrets
    template:
      engineVersion: v2
      data:
        # Composes admin password + S3 creds in one values.yaml fragment.
        # Both come from OpenBao (admin_password seeded by tofu/pki,
        # S3 access/secret keys mirrored from harbor-s3-credentials by
        # the PushSecret above).
        values.yaml: |
          harborAdminPassword: {{ .admin_password }}
          persistence:
            imageChartStorage:
              s3:
                accesskey: {{ .accesskey }}
                secretkey: {{ .secretkey }}
  data:
    - secretKey: admin_password
      remoteRef:
        key: storage/harbor
        property: admin_password
    - secretKey: accesskey
      remoteRef:
        key: storage/harbor-s3
        property: access_key
    - secretKey: secretkey
      remoteRef:
        key: storage/harbor-s3
        property: secret_key
