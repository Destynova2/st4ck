apiVersion: v1
kind: Namespace
metadata:
  name: storage
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: garage
  # PSA labels MUST mirror what stacks/storage/main.tf sets on its
  # kubernetes_namespace.garage resource. Without this Flux server-side
  # apply strips the label on every reconcile cycle (silent PSA drift —
  # garage pods then fail admission once a non-baseline workload is
  # introduced). Postmortem 2026-04-29.
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
