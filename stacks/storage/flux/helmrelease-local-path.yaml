apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: storage
spec:
  interval: 30m
  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.35"
      sourceRef:
        kind: HelmRepository
        name: containeroo
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: local-path-provisioner-values
      valuesKey: values.yaml
      optional: false
