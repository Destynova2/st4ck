apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: garage
spec:
  interval: 30m
  dependsOn:
    - name: local-path-provisioner
      namespace: storage
  chart:
    spec:
      # Vendored chart at this path inside the management GitRepository
      # (Chart.yaml lives directly under stacks/storage/chart/).
      # `chart` is the path INSIDE the source, not a chart name.
      chart: ./stacks/storage/chart
      sourceRef:
        kind: GitRepository
        name: management
        namespace: flux-system
      # version omitted — taken from Chart.yaml inside the path above
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: garage-values
      valuesKey: values.yaml
      optional: false
    - kind: Secret
      name: garage-secrets
      valuesKey: values.yaml
      optional: false
