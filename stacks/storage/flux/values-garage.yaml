# Garage S3-compatible object store — Helm values for chart v0.9.2 (Garage v2.3.0)
# Chart fetched via: make garage-chart
# Source: https://git.deuxfleurs.fr/Deuxfleurs/garage (branch main-v2)
# v2.3.0 release notes: no breaking changes from v2.2.0, includes XML
# parsing fixes (DeleteObjects, website config) and CORS handling fixes
# that may improve compatibility with strict S3 SDK clients (boto3, etc.).

garage:
  rpcSecret: "${garage_rpc_secret}"
  s3:
    api:
      rootDomain: ".s3.garage.local"
    web:
      rootDomain: ".web.garage.local"
  admin:
    api_bind_addr: "[::]:3903"

deployment:
  replicaCount: 3
  podManagementPolicy: Parallel
  fullnameOverride: "garage"

# image override at TOP LEVEL — chart reads .Values.image.*, not
# .Values.deployment.image.* (the latter was a values typo that meant
# Garage stayed on chart-default v2.2.0 forever despite tag bumps).
image:
  repository: dxflrs/amd64_garage
  tag: "v2.3.0"

persistence:
  meta:
    storageClass: local-path
    size: 1Gi
  data:
    storageClass: local-path
    size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

environment:
  - name: GARAGE_ADMIN_TOKEN
    value: "${garage_admin_token}"

livenessProbe:
  tcpSocket:
    port: 3900
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 3903
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 60
