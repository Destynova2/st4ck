apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# See stacks/cni/flux/kustomization.yaml for the configMapGenerator pattern
# rationale (single source of truth for tofu + Flux).
#
# NOTE: local-path-provisioner moved to stacks/cni/ (tofu-owned) — see
# postmortem 2026-04-29. Flux runs after pki via flux-bootstrap, but pki
# needs PVCs (StorageClass) on first deploy → chicken/egg. local-path is
# now installed by the cni tofu stack which runs first.
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease-garage.yaml
  - helmrelease-velero.yaml
  - helmrelease-harbor.yaml
  - external-secrets.yaml
configMapGenerator:
  - name: garage-values
    namespace: garage
    files:
      - values.yaml=values-garage.yaml
  - name: velero-values
    namespace: storage
    files:
      - values.yaml=values-velero.yaml
  - name: harbor-values
    namespace: storage
    files:
      - values.yaml=values-harbor.yaml
generatorOptions:
  disableNameSuffixHash: true
