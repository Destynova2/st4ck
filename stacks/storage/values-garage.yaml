# Garage S3-compatible object store — Helm values for chart v0.9.2 (Garage v2.2.0)
# Chart fetched via: make garage-chart
# Source: https://git.deuxfleurs.fr/Deuxfleurs/garage (branch main-v2)

garage:
  rpcSecret: "${garage_rpc_secret}"
  s3:
    api:
      rootDomain: ".s3.garage.local"
    web:
      rootDomain: ".web.garage.local"

deployment:
  replicaCount: 3
  podManagementPolicy: Parallel
  fullnameOverride: "garage"
  image:
    repository: dxflrs/garage
    tag: "v2.2.0"

persistence:
  meta:
    storageClass: local-path
    size: 1Gi
  data:
    storageClass: local-path
    size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

environment:
  - name: GARAGE_ADMIN_TOKEN
    value: "${garage_admin_token}"

livenessProbe:
  tcpSocket:
    port: 3900
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 3903
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 60
