apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Harbor HelmRelease (split out of ../flux/kustomization.yaml so a Flux
# Kustomization wrapper can gate it on the storage-harbor-eso
# Kustomization — see clusters/management/storage-harbor.yaml).
#
# Mirror of stacks/security/flux-openclarity/ (Fix #7). Without this
# split, Flux installs Harbor immediately and the install fails until
# the harbor-secrets ExternalSecret catches up — the chart references
# admin password + S3 keys via valuesFrom optional: false, so the chart
# template render fails outright (not just at runtime).
resources:
  - helmrelease-harbor.yaml
configMapGenerator:
  - name: harbor-values
    namespace: storage
    files:
      - values.yaml=values-harbor.yaml
generatorOptions:
  disableNameSuffixHash: true
