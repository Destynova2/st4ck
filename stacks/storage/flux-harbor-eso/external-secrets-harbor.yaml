# Harbor ExternalSecret + PushSecret pipeline (split out of ../flux/
# external-secrets.yaml — postmortem 2026-04-29 #15, mirror of #7 for
# openclarity).
#
# Race that motivated the split:
#   The harbor HelmRelease in ../flux-harbor/ references harbor-secrets
#   as `optional: false` valuesFrom (admin password is mandatory at
#   install). harbor-secrets is rendered by the ExternalSecret below,
#   which depends on:
#     - secret/storage/harbor (admin_password — seeded by tofu pki)
#     - secret/storage/harbor-s3 (S3 access/secret keys — populated by
#       the harbor-s3-mirror PushSecret below from K8s Secret
#       harbor-s3-credentials, which is created by the
#       garage_buckets_keys terraform_data in storage/main.tf).
#   Without the split, Flux applies HR + ESO + PushSecret in parallel:
#     - PushSecret needs ~5-10s for first cycle (push to OpenBao)
#     - ExternalSecret needs ~30s for first cycle (pull from OpenBao)
#     - HR install fires immediately → "harbor-secrets not found" →
#       30min retry loop on every fresh deploy
#
# Solution: this Kustomization (storage-harbor-eso) waits for both ES
# objects to reach Ready, then storage-harbor releases the HelmRelease.
# Pattern is identical to security-openclarity-{eso,helm} (Fix #7).
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-s3-mirror
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao-infra
      kind: ClusterSecretStore
  selector:
    secret:
      name: harbor-s3-credentials
  data:
    - match:
        secretKey: access_key
        remoteRef:
          remoteKey: storage/harbor-s3
          property: access_key
    - match:
        secretKey: secret_key
        remoteRef:
          remoteKey: storage/harbor-s3
          property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-secrets
  namespace: storage
spec:
  # Short refresh during the bootstrap window so day-1 is reliable —
  # PushSecret + this ES are applied in the same Flux Kustomization, so
  # the source path may not exist for the first 5-10s. 30s = at most one
  # short retry before the storage-harbor Kustomization's dependsOn
  # releases the HelmRelease.
  refreshInterval: 30s
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: harbor-secrets
    template:
      engineVersion: v2
      data:
        # Composes admin password + S3 creds in one values.yaml fragment.
        # Both come from OpenBao (admin_password seeded by tofu/pki,
        # S3 access/secret keys mirrored from harbor-s3-credentials by
        # the PushSecret above).
        values.yaml: |
          harborAdminPassword: {{ .admin_password }}
          persistence:
            imageChartStorage:
              s3:
                accesskey: {{ .accesskey }}
                secretkey: {{ .secretkey }}
  data:
    - secretKey: admin_password
      remoteRef:
        key: storage/harbor
        property: admin_password
    - secretKey: accesskey
      remoteRef:
        key: storage/harbor-s3
        property: access_key
    - secretKey: secretkey
      remoteRef:
        key: storage/harbor-s3
        property: secret_key
