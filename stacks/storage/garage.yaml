# Garage S3-compatible object store — StatefulSet for Kubernetes
# Lightweight (~100 MB RAM per pod), Rust-based, geo-distributed
---
apiVersion: v1
kind: Namespace
metadata:
  name: garage
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    db_engine = "lmdb"
    metadata_dir = "/mnt/meta"
    data_dir = "/mnt/data"
    replication_factor = 3
    compression_level = 1
    block_size = 1048576
    rpc_bind_addr = "[::]:3901"
    rpc_secret = "${garage_rpc_secret}"

    # Peer discovery via Kubernetes API (no DNS needed, works with static binary)
    bootstrap_peers = []

    [kubernetes_discovery]
    namespace = "garage"
    service_name = "garage"
    skip_crd = false

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.local"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.garage.local"
    index = "index.html"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "${garage_admin_token}"
---
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: garage
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: garage
  ports:
    - name: s3-api
      port: 3900
      targetPort: 3900
    - name: rpc
      port: 3901
      targetPort: 3901
    - name: web
      port: 3902
      targetPort: 3902
    - name: admin
      port: 3903
      targetPort: 3903
---
apiVersion: v1
kind: Service
metadata:
  name: garage-s3
  namespace: garage
spec:
  type: ClusterIP
  selector:
    app: garage
  ports:
    - name: s3-api
      port: 3900
      targetPort: 3900
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage
  namespace: garage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-discovery
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["deuxfleurs.fr"]
    resources: ["garagenodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: garage-discovery
subjects:
  - kind: ServiceAccount
    name: garage
    namespace: garage
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage
spec:
  serviceName: garage
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      serviceAccountName: garage
      containers:
        - name: garage
          image: dxflrs/garage:v2.2.0
          ports:
            - containerPort: 3900
              name: s3-api
            - containerPort: 3901
              name: rpc
            - containerPort: 3902
              name: web
            - containerPort: 3903
              name: admin
          volumeMounts:
            - name: meta
              mountPath: /mnt/meta
            - name: data
              mountPath: /mnt/data
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 3900
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3903
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: config
          configMap:
            name: garage-config
  volumeClaimTemplates:
    - metadata:
        name: meta
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
