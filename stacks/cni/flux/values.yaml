# Cilium Helm values for Talos Linux
# Used to template manifests: helm template cilium cilium/cilium -f values.yaml
ipam:
  mode: kubernetes

kubeProxyReplacement: true

# Socket-level load balancing (required when kube-proxy is disabled and host
# network workloads — kube-apiserver, kubelet — need to reach Service ClusterIPs.
# Without this, validating/mutating webhooks called by kube-apiserver time out.
socketLB:
  enabled: true
  hostNamespaceOnly: false

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

k8sServiceHost: localhost
k8sServicePort: 7445

hubble:
  enabled: true
  # Hubble TLS issued by cert-manager via the Vault-backed `internal-ca`
  # ClusterIssuer (OpenBao PKI engine). This brings Cilium hubble-relay +
  # hubble-server certs into the cluster-wide audit trail (every issuance
  # logged in OpenBao audit devices), same as identity-pg, hydra-tls,
  # openbao-infra-tls, etc.
  #
  # Bootstrap caveat: Cilium is deployed BEFORE pki/cert-manager
  # (canonical order: cni → pki → ...). On first apply the ClusterIssuer
  # `internal-ca` doesn't exist yet → hubble-relay Pod stays NotReady
  # until cert-manager + OpenBao + the ClusterIssuer come up. Cilium
  # agent itself is unaffected (Hubble is observability-only).
  #
  # CN auto-generated by Cilium: *.{cluster.name}.hubble-grpc.cilium.io
  # (cluster.name defaults to "default" — adjust here if multi-cluster).
  # Vault PKI role pki_int/cluster-issuer has allow_any_name=true so it
  # accepts this name without modification.
  tls:
    auto:
      enabled: true
      method: certmanager
      certValidityDuration: 1095  # 3 years (well below pki_int 5y)
      # cilium-issuer (NOT internal-ca) — Cilium chart hardcodes RSA-2048
      # for hubble TLS Certificate CRs (no privateKey override exposed).
      # Our main `internal-ca` ClusterIssuer enforces strict ECDSA via
      # Vault PKI role constraint key_type=ec → would reject RSA with 400.
      #
      # Workaround: dedicated `cilium-issuer` ClusterIssuer pointing at a
      # SECOND PKI role `cilium-hubble` (key_type=any, CN allowlist
      # scoped to *.hubble-{grpc,relay}.cilium.io). Same OpenBao audit
      # log, isolated RSA exception. See stacks/pki/secrets.tf +
      # stacks/pki/main.tf for the role + issuer definition.
      #
      # Pure ECDSA cluster-wide via a Kyverno mutate ClusterPolicy was
      # attempted (commit reverted) but Kyverno's default kube-system
      # exclusion + Cilium's `privateKey: {rotationPolicy: Always}` (no
      # algorithm) made the +(algorithm) anchor a non-trivial fix —
      # not worth the friction for an internal observability layer.
      certManagerIssuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: cilium-issuer
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
    serviceMonitor:
      enabled: false
    dashboards:
      enabled: false
  relay:
    enabled: true
    prometheus:
      enabled: true
  ui:
    enabled: false

prometheus:
  enabled: true
  serviceMonitor:
    enabled: false

operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: false
