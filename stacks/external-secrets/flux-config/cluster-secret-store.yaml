apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao-infra
spec:
  provider:
    vault:
      # OpenBao listens HTTPS via cert-manager Certificate (signed by the
      # `internal-ca` ClusterIssuer = infra sub-CA). HTTP access is
      # disabled. The caProvider below points ESO at our root CA so its
      # client trusts the cert chain.
      server: "https://openbao-infra.secrets.svc:8200"
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: pki-root-ca
        namespace: secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
