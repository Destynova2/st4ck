# Kratos + Hydra DSN: composed from CNPG-managed identity-pg-app via
# OpenBao (Pattern B from the audit — ESO PushSecret mirrors CNPG creds
# into OpenBao KV, so OpenBao remains the single source of truth for
# downstream consumers; CNPG keeps password ownership; rotations are
# auto-reflected on next ESO sync).
#
# Flow:
#   identity-pg-app (CNPG) ─▶ PushSecret ─▶ secret/identity/db/postgres (OpenBao)
#                                                       │
#                       ┌───────────────────────────────┴────────────────┐
#                       ▼                                                ▼
#         ExternalSecret kratos-secrets                  ExternalSecret hydra-secrets
#         (templates values.yaml with                    (templates values.yaml with
#          dsn + search_path=kratos)                      dsn + search_path=hydra +
#                                                         existing system_secret)
#
# Why this is the canonical pattern:
#   - All secrets centralized in OpenBao for audit/compliance
#   - CNPG owns the password (operator-native rotation)
#   - PushSecret auto-syncs on rotation (no Tofu re-apply needed)
#   - Templates compose the DSN string at sync time (sprig v2)

# ─── PushSecret: CNPG identity-pg-app → OpenBao ────────────────────────
# Mirrors the operator-managed Secret into OpenBao KV at
# secret/identity/db/postgres so all downstream reads happen via OpenBao.
# Source = local Secret in the same namespace (selector.secret.name);
# target = OpenBao (secretStoreRefs).  No SecretStore needed for the
# source — PushSecret reads K8s Secrets natively.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: identity-pg-mirror
  namespace: identity
spec:
  refreshInterval: 1h
  # Source: K8s SecretStore (kubernetes-identity ClusterSecretStore reads
  # identity-pg-app). Target: OpenBao via openbao-infra ClusterSecretStore.
  # PushSecret in v1alpha1 uses secretStoreRefs for TARGETS only; the SOURCE
  # is a local Secret in the same ns as the PushSecret resource.
  secretStoreRefs:
    - name: openbao-infra
      kind: ClusterSecretStore
  selector:
    secret:
      name: identity-pg-app
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: identity/db/postgres
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: identity/db/postgres
          property: password
    - match:
        secretKey: host
        remoteRef:
          remoteKey: identity/db/postgres
          property: host
    - match:
        secretKey: port
        remoteRef:
          remoteKey: identity/db/postgres
          property: port
    - match:
        secretKey: dbname
        remoteRef:
          remoteKey: identity/db/postgres
          property: dbname
---
# ─── ExternalSecret: kratos-secrets ─────────────────────────────────────
# Reads from OpenBao (where PushSecret just mirrored the CNPG creds) and
# composes the DSN with search_path=kratos. The HelmRelease's valuesFrom
# Secret merges this into chart values, overriding kratos.config.dsn.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kratos-secrets
  namespace: identity
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: kratos-secrets
    template:
      engineVersion: v2
      data:
        values.yaml: |
          kratos:
            config:
              dsn: postgres://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}?sslmode=disable&search_path=kratos
  data:
    - secretKey: username
      remoteRef: { key: identity/db/postgres, property: username }
    - secretKey: password
      remoteRef: { key: identity/db/postgres, property: password }
    - secretKey: host
      remoteRef: { key: identity/db/postgres, property: host }
    - secretKey: port
      remoteRef: { key: identity/db/postgres, property: port }
    - secretKey: dbname
      remoteRef: { key: identity/db/postgres, property: dbname }
