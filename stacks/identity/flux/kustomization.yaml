apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# See stacks/cni/flux/kustomization.yaml for the configMapGenerator pattern
# rationale (single source of truth for tofu + Flux).
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease-kratos.yaml
  - helmrelease-hydra.yaml
  - helmrelease-pomerium.yaml
  - hydra-certificate.yaml
  - external-secrets.yaml
configMapGenerator:
  - name: kratos-values
    namespace: identity
    files:
      - values.yaml=values-kratos.yaml
  - name: hydra-values
    namespace: identity
    files:
      - values.yaml=values-hydra.yaml
  - name: pomerium-values
    namespace: identity
    files:
      - values.yaml=values-pomerium.yaml
generatorOptions:
  disableNameSuffixHash: true
