apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kratos
  namespace: identity
spec:
  interval: 30m
  chart:
    spec:
      chart: kratos
      version: "0.60.1"
      sourceRef:
        kind: HelmRepository
        name: ory
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: kratos-values
      valuesKey: values.yaml
      optional: false
    # DSN injected separately — values-kratos.yaml has no ${dsn}
    # placeholder anymore (Flux can't templatefile). The Secret is
    # composed by ExternalSecret kratos-secrets from CNPG identity-pg-app.
    - kind: Secret
      name: kratos-secrets
      valuesKey: values.yaml
      optional: false
