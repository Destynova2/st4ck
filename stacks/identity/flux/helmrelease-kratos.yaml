apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kratos
  namespace: identity
spec:
  interval: 30m
  chart:
    spec:
      chart: kratos
      version: "0.60.1"
      sourceRef:
        kind: HelmRepository
        name: ory
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: kratos-values
      valuesKey: values.yaml
      optional: false
