apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pomerium
  namespace: identity
spec:
  interval: 30m
  dependsOn:
    - name: hydra
  chart:
    spec:
      chart: pomerium
      version: "34.0.1"
      sourceRef:
        kind: HelmRepository
        name: pomerium
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: pomerium-values
      valuesKey: values.yaml
      optional: false
    - kind: Secret
      name: pomerium-secrets
      valuesKey: values.yaml
      optional: false
