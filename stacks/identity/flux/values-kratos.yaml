# Ory Kratos — Identity management
# Production mode: PostgreSQL

kratos:
  development: false

  config:
    # NOTE: dsn is injected by the ExternalSecret kratos-secrets via the
    # HelmRelease's valuesFrom Secret merge — leaving it unset here means
    # the ConfigMap-loaded values don't carry "${dsn}" anymore (Flux
    # can't templatefile() the way tofu did). See
    # external-secrets-kratos.yaml for the composition.

    serve:
      public:
        base_url: http://127.0.0.1:4433/
        cors:
          enabled: true
      admin:
        base_url: http://kratos:4434/

    selfservice:
      default_browser_return_url: http://127.0.0.1:4455/
      flows:
        login:
          ui_url: http://127.0.0.1:4455/login
        registration:
          ui_url: http://127.0.0.1:4455/registration
          enabled: true
        settings:
          ui_url: http://127.0.0.1:4455/settings

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: base64:

  automigration:
    enabled: true

replicaCount: 1
