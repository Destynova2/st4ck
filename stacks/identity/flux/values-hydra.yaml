# Ory Hydra — OAuth2 / OIDC server
# Production mode: PostgreSQL, TLS on public endpoint

hydra:
  dev: false

  config:
    # NOTE: dsn is injected by ExternalSecret hydra-secrets via the
    # HelmRelease's valuesFrom Secret merge — see
    # external-secrets-kratos.yaml (PushSecret mirrors CNPG identity-pg-app
    # into OpenBao at secret/identity/db/postgres) and external-secrets.yaml
    # (hydra-secrets ES composes the DSN with search_path=hydra).

    serve:
      public:
        cors:
          enabled: true
        tls:
          cert:
            path: /etc/hydra/tls/tls.crt
          key:
            path: /etc/hydra/tls/tls.key
      admin:
        host: 0.0.0.0

    urls:
      self:
        issuer: https://hydra-public.identity.svc:4444/
      consent: http://127.0.0.1:4455/consent
      login: http://127.0.0.1:4455/login
      logout: http://127.0.0.1:4455/logout

    secrets:
      system:
        - ${system_secret}

    oidc:
      subject_identifiers:
        supported_types:
          - public

  automigration:
    enabled: true

replicaCount: 1

deployment:
  extraVolumes:
    - name: hydra-tls
      secret:
        secretName: hydra-tls
  extraVolumeMounts:
    - name: hydra-tls
      mountPath: /etc/hydra/tls
      readOnly: true
