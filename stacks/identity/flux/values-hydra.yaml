# Ory Hydra — OAuth2 / OIDC server
# Production mode: PostgreSQL, TLS on public endpoint

hydra:
  dev: false

  config:
    dsn: "${dsn}"

    serve:
      public:
        cors:
          enabled: true
        tls:
          cert:
            path: /etc/hydra/tls/tls.crt
          key:
            path: /etc/hydra/tls/tls.key
      admin:
        host: 0.0.0.0

    urls:
      self:
        issuer: https://hydra-public.identity.svc:4444/
      consent: http://127.0.0.1:4455/consent
      login: http://127.0.0.1:4455/login
      logout: http://127.0.0.1:4455/logout

    secrets:
      system:
        - ${system_secret}

    oidc:
      subject_identifiers:
        supported_types:
          - public

  automigration:
    enabled: true

replicaCount: 1

deployment:
  extraVolumes:
    - name: hydra-tls
      secret:
        secretName: hydra-tls
  extraVolumeMounts:
    - name: hydra-tls
      mountPath: /etc/hydra/tls
      readOnly: true
