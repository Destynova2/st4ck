# ─────────────────────────────────────────────────────────────────────
# TEMPLATE — NOT applied by this stack.
# Rendered per tenant by `stacks/managed-cluster`.
#
# Pool: compute  (CPU-optimised workloads — weight 40)
# Ref:  ADR-025 section 3.5
# ─────────────────────────────────────────────────────────────────────
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: compute
  labels:
    st4ck.io/tenant: "{{ .Tenant }}"
    st4ck.io/pool: "compute"
spec:
  weight: 40
  template:
    metadata:
      labels:
        st4ck.io/pool: "compute"
    spec:
      nodeClassRef:
        group: cluster.x-k8s.io
        kind: MachineDeployment
        name: "{{ .MachineDeployment }}-compute"
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - POP2-HC-16C-32G
            - POP2-HC-32C-64G
            - POP2-HC-64C-128G
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      taints:
        - key: st4ck.io/pool
          value: compute
          effect: PreferNoSchedule
      expireAfter: 720h
  limits:
    cpu: "2000"
    memory: "4000Gi"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
