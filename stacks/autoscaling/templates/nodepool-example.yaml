# ─────────────────────────────────────────────────────────────────────
# TEMPLATE — NOT applied by this stack.
#
# This file is a reference NodePool rendered by `stacks/managed-cluster`
# per tenant (one NodePool per pool declared in the tenant's
# `ManagedCluster.spec.workers[*]`). Placeholders `{{ .Tenant }}`,
# `{{ .Pool }}`, `{{ .MachineDeployment }}` etc. are substituted at
# render time.
#
# Pool: general  (POP2 general-purpose, cheap-first default)
# Ref:  ADR-025 section 3.5
# ─────────────────────────────────────────────────────────────────────
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
  labels:
    st4ck.io/tenant: "{{ .Tenant }}"
    st4ck.io/pool: "general"
spec:
  weight: 50
  template:
    metadata:
      labels:
        st4ck.io/pool: "general"
    spec:
      nodeClassRef:
        group: cluster.x-k8s.io
        kind: MachineDeployment
        name: "{{ .MachineDeployment }}-general"
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - POP2-2C-8G
            - POP2-4C-16G
            - POP2-8C-32G
            - POP2-16C-64G
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      expireAfter: 720h  # 30d — forces node rotation for OS patching
  limits:
    cpu: "1000"
    memory: "4000Gi"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
