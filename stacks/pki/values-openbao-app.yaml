# OpenBao App — application secrets
# Standalone mode with file storage + static seal + self-init

server:
  dev:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        address         = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_cert_file   = "/openbao/tls/tls.crt"
        tls_key_file    = "/openbao/tls/tls.key"
      }

      storage "file" {
        path = "/openbao/data"
      }

      seal "static" {
        current_key_id = "app-1"
        current_key    = "env://BAO_SEAL_KEY"
      }

      # ─── Self-init: KV v2 for application secrets ────────────────
      initialize "kv" {
        request "mount-kv" {
          operation = "update"
          path      = "sys/mounts/secret"
          data = {
            type    = "kv"
            options = { version = "2" }
          }
        }
      }

  extraSecretEnvironmentVars:
    - envName: BAO_SEAL_KEY
      secretName: openbao-seal-key
      secretKey: key

  extraVolumes:
    - type: secret
      name: openbao-app-tls

  extraVolumeMounts:
    - name: openbao-app-tls
      mountPath: /openbao/tls
      readOnly: true

  dataStorage:
    enabled: true
    size: 1Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: false

csi:
  enabled: false

ui:
  enabled: true
