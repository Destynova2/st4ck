# OpenBao App — application secrets
# HA mode with Raft storage (3 replicas) + static seal + self-init + TLS
#
# Phase F-bis-2 — Helm-native HA. Deploy 3 replicas d'emblée avec
# podManagementPolicy=OrderedReady (K8s sequential start) + retry_join
# blocks pour tous les pods. Remplace l'ancien pattern Bootstrap@1 +
# terraform_data.openbao_app_scale_to_ha (Fix #5/#11/#32) qui scalait
# 1→3 par script bash + recovery loop fragile sur split-brain.
# Postmortem 2026-04-30 — Phase F-bis-2.

global:
  tlsDisable: false

server:
  dev:
    enabled: false

  standalone:
    enabled: false

  # Phase F-bis-2 — Helm-native HA pattern. Voir values-openbao-infra.yaml
  # pour rationale complet (OpenBao 2.x split-brain race window éliminée
  # architecturalement par podManagementPolicy=OrderedReady).
  statefulSet:
    podManagementPolicy: OrderedReady

  livenessProbe:
    initialDelaySeconds: 60

  readinessProbe:
    failureThreshold: 6

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file   = "/openbao/userconfig/openbao-app-tls/tls.crt"
          tls_key_file    = "/openbao/userconfig/openbao-app-tls/tls.key"
        }

        storage "raft" {
          path = "/openbao/data"

          # retry_join: pods 1+2 wait until pod-0 is the active leader,
          # then auto-join its Raft cluster. Without this each pod
          # initializes its own 1-node Raft cluster (= no HA, service
          # round-robin sends requests to empty followers). Same fix as
          # openbao-infra (postmortem 2026-04-26 + 2026-04-29).
          # leader_tls_servername MUST match a SAN on openbao-app-tls.
          retry_join {
            leader_api_addr       = "https://openbao-app-0.openbao-app-internal:8200"
            leader_tls_servername = "openbao-app"
            leader_ca_cert_file   = "/openbao/userconfig/openbao-app-tls/ca.crt"
          }
          retry_join {
            leader_api_addr       = "https://openbao-app-1.openbao-app-internal:8200"
            leader_tls_servername = "openbao-app"
            leader_ca_cert_file   = "/openbao/userconfig/openbao-app-tls/ca.crt"
          }
          retry_join {
            leader_api_addr       = "https://openbao-app-2.openbao-app-internal:8200"
            leader_tls_servername = "openbao-app"
            leader_ca_cert_file   = "/openbao/userconfig/openbao-app-tls/ca.crt"
          }
        }

        service_registration "kubernetes" {}

        seal "static" {
          current_key_id = "app-1"
          current_key    = "env://BAO_SEAL_KEY"
        }

        # ─── Self-init: KV v2 for application secrets ────────────────
        initialize "kv" {
          request "mount-kv" {
            operation = "update"
            path      = "sys/mounts/secret"
            data = {
              type    = "kv"
              options = { version = "2" }
            }
          }
        }

  extraSecretEnvironmentVars:
    - envName: BAO_SEAL_KEY
      secretName: openbao-seal-key
      secretKey: key

  extraVolumes:
    - type: secret
      name: openbao-app-tls

  dataStorage:
    enabled: true
    size: 1Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: false

csi:
  enabled: false

ui:
  enabled: true
