# OpenBao App — application secrets
# HA mode with Raft storage (3 replicas) + static seal + self-init + TLS

global:
  tlsDisable: false

server:
  dev:
    enabled: false

  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file   = "/openbao/userconfig/openbao-app-tls/tls.crt"
          tls_key_file    = "/openbao/userconfig/openbao-app-tls/tls.key"
        }

        storage "raft" {
          path = "/openbao/data"
        }

        service_registration "kubernetes" {}

        seal "static" {
          current_key_id = "app-1"
          current_key    = "env://BAO_SEAL_KEY"
        }

        # ─── Self-init: KV v2 for application secrets ────────────────
        initialize "kv" {
          request "mount-kv" {
            operation = "update"
            path      = "sys/mounts/secret"
            data = {
              type    = "kv"
              options = { version = "2" }
            }
          }
        }

  extraSecretEnvironmentVars:
    - envName: BAO_SEAL_KEY
      secretName: openbao-seal-key
      secretKey: key

  extraVolumes:
    - type: secret
      name: openbao-app-tls

  dataStorage:
    enabled: true
    size: 1Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: false

csi:
  enabled: false

ui:
  enabled: true
