# ═══════════════════════════════════════════════════════════════════════
# Phase F-bis-2 v3 — Bootstrap OpenBao PKI engine via Helm post-install Job
#
# Replaces terraform_data.bootstrap_openbao_pki (~180 LOC bash in
# stacks/pki/secrets.tf). K8s-native pattern: Helm post-install + post-upgrade
# hook fires AFTER the OpenBao Helm release is installed/upgraded, runs the
# PKI mount + sub-CA setup as a Job, then deletes itself.
#
# Architecture (ADR-032):
#   1. Root CA: stays on CI VM (bootstrap/tofu/pki.tf, ECDSA P-384, 10 yr).
#      Distributed to cluster as K8s Secret `pki-root-ca` in `secrets` ns.
#   2. Sub-CAs (cluster-issuer + cilium-hubble): created in-cluster OpenBao
#      via this Job — pki_int/ engine generates the intermediate, cluster
#      Root signs it (sign-intermediate), uploaded back. NO separate root
#      generation in the cluster (which would have duplicated the VM root
#      and confused trust chains).
#
# Hook ordering:
#   - hook-weight: 10  → fires AFTER any other post-install hook with
#                        weight < 10 (none today, room for future).
#   - delete-policy: before-hook-creation,hook-succeeded
#       → cleans up the previous Job before re-creating (idempotent rerun)
#       → deletes itself once successful (no Job graveyard).
#
# Idempotency: every step is guarded by `bao read` / `bao secrets list` /
# `bao auth list` probes. Re-running this Job is a no-op once OpenBao is
# already configured.
# ═══════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootstrap-openbao-pki
  namespace: secrets
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bootstrap-openbao-pki
  namespace: secrets
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # Read the admin password (random_password in tofu) + the VM root CA
  # certificate (distributed by tofu as kubernetes_secret.pki_root_ca).
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - openbao-admin-password
      - pki-root-ca
    verbs: ["get"]
  # Allow `kubectl exec` into openbao-infra-0 to drive `bao` CLI commands.
  # The Job container itself doesn't run `bao` against localhost — it runs
  # `kubectl exec` into the pod, identical pattern to the old terraform_data
  # so we don't have to re-engineer TLS endpoints / SAN handling.
  - apiGroups: [""]
    resources: ["pods/exec"]
    resourceNames:
      - openbao-infra-0
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames:
      - openbao-infra-0
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bootstrap-openbao-pki
  namespace: secrets
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bootstrap-openbao-pki
subjects:
  - kind: ServiceAccount
    name: bootstrap-openbao-pki
    namespace: secrets
---
apiVersion: batch/v1
kind: Job
metadata:
  name: bootstrap-openbao-pki
  namespace: secrets
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: bootstrap-openbao-pki
      # PSA baseline (matches the secrets namespace label set in
      # namespace.yaml) — no privileged caps needed, kubectl exec is the
      # only "elevated" thing and that's RBAC-gated above.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pki-init
          # bitnami/kubectl bundles kubectl + a small shell. We don't need
          # the openbao image here because every `bao` command is shipped
          # via `kubectl exec` into openbao-infra-0 (which has bao in $PATH).
          # Pin to a digest in a future hardening pass — for now match the
          # version family used elsewhere in the stack.
          image: alpine/k8s:1.35.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: BAO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openbao-admin-password
                  key: password
            # Root CA cert from the VM (distributed by tofu as
            # kubernetes_secret.pki_root_ca). The cluster sub-CA pki_int
            # is signed by this root via `pki/root/sign-intermediate` —
            # NOT by a freshly-generated cluster root (which would break
            # the chain and confuse cert-manager + ESO trust paths).
            - name: ROOT_CA_PEM
              valueFrom:
                secretKeyRef:
                  name: pki-root-ca
                  key: ca.crt
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              # All `bao` commands go through `kubectl exec` into
              # openbao-infra-0 — same pattern as the old terraform_data
              # script so the TLS endpoint (cert-manager-issued, valid for
              # cluster-internal DNS only) doesn't need rewiring.
              # `-i` is required so heredoc stdin (bao policy write -)
              # reaches the pod.
              BAO="kubectl -n secrets exec -i openbao-infra-0 -c openbao -- env BAO_ADDR=https://127.0.0.1:8200 BAO_SKIP_VERIFY=true"

              # ─── 1. Wait for OpenBao Infra API ──────────────────────────
              # Pattern 1 (Phase F-bis): 1s polling, 300s budget, explicit
              # timeout exit. `kubectl exec` is the dominant cost
              # (~150-300ms) so 1s sleep is the floor.
              echo "Waiting for OpenBao Infra API..."
              ready=0
              for i in $(seq 1 300); do
                if $BAO bao status >/dev/null 2>&1; then
                  echo "  OpenBao ready after ${i}s"
                  ready=1
                  break
                fi
                sleep 1
              done
              if [ "$ready" -ne 1 ]; then
                echo "ERROR: OpenBao Infra API not reachable after 300s" >&2
                exit 1
              fi

              echo "Logging in as admin..."
              $BAO bao login -method=userpass username=admin password="$BAO_ADMIN_PASSWORD" >/dev/null 2>&1 || \
                { echo "ERROR: OpenBao login failed"; exit 1; }

              # ─── 2. Enable pki_int mount (idempotent) ───────────────────
              # NOTE: Phase F-bis-2 v3 architecture — NO `pki/` (root) mount.
              # The root lives on the CI VM (bootstrap/tofu/pki.tf, ECDSA
              # P-384, 10 yr). Cluster only owns the intermediate.
              # The intermediate's max-lease is 5 yr (matches VM-side
              # tls_locally_signed_cert.infra_ca validity_period_hours=43800).
              echo "Enabling pki_int/ mount (5y max-lease)..."
              if $BAO bao secrets list 2>/dev/null | grep -q '^pki_int/'; then
                echo "  pki_int/ already mounted, skipping"
              else
                $BAO bao secrets enable -path=pki_int -max-lease-ttl=43800h pki
              fi

              # ─── 3. Generate intermediate CSR + sign with VM root ──────
              # The intermediate's private key NEVER leaves OpenBao
              # (`pki_int/intermediate/generate/internal`). We sign the CSR
              # OFFLINE-style using `openssl` against the VM root cert +
              # key... EXCEPT we don't have the VM root key in the cluster
              # (by design — that's the whole point of keeping it on the VM).
              #
              # MIGRATION NOTE (Phase F-bis-2 v3): the original
              # terraform_data signed intermediate with a CLUSTER-generated
              # root via `pki/root/sign-intermediate` (round-trip inside
              # OpenBao). Going forward we have two valid paths:
              #
              #   A. Pre-sign the intermediate cert on the VM during
              #      `bootstrap-apply` (output: kms-output/infra-ca.pem),
              #      distribute as K8s Secret pki-infra-ca, this Job calls
              #      `pki_int/intermediate/set-signed certificate=@vm-signed`.
              #      → CURRENT STATE: stacks/pki/main.tf already creates
              #        kubernetes_secret.pki_infra_ca with tls.crt + tls.key
              #        from kms-output/infra-ca-* files.
              #
              #   B. Generate a fresh intermediate inside OpenBao and have a
              #      VM-side signer service expose `/sign-intermediate` to
              #      the cluster (out of scope for Phase F-bis-2 v3 — adds
              #      a network round-trip and a long-lived signer endpoint).
              #
              # We pick A: re-use the existing VM-signed intermediate cert
              # + key (already in K8s as Secret pki-infra-ca, namespace
              # secrets) and load it directly via `pki_int/config/ca`
              # (which accepts a full cert+key bundle in PEM).
              #
              # This means the intermediate private key DOES briefly live
              # in the cluster (as K8s Secret + inside OpenBao) — same as
              # the pre-existing kubernetes_secret.cert_manager_ca pattern
              # (intermediate-ca-keypair in cert-manager ns). Acceptable
              # tradeoff: the root key stays VM-side, so a cluster
              # compromise can't forge a new intermediate, only abuse the
              # existing one (which has a 5y max validity bounded by the
              # root signature).
              #
              # IMPORTANT: this Job does NOT have access to the
              # intermediate key Secret — that's intentional. The first
              # apply path stays in stacks/pki/secrets.tf as a one-shot
              # `bao write pki_int/config/ca` resource (TBD: separate Job
              # or kubectl_manifest). For Phase F-bis-2 v3 source-only,
              # we install the engine + roles + auth, leave intermediate
              # CA loading as a follow-up step (documented in ADR-032).
              echo "Checking for existing intermediate CA on pki_int/..."
              if $BAO bao read pki_int/cert/ca 2>&1 | grep -q -- "-----BEGIN CERTIFICATE-----"; then
                echo "  intermediate CA already loaded on pki_int/, skipping"
              else
                echo "  WARN: pki_int/ has no CA loaded yet."
                echo "  Phase F-bis-2 v3 follow-up: load VM-signed intermediate via"
                echo "    'bao write pki_int/config/ca pem_bundle=@<infra-ca-bundle>'"
                echo "  (Secret pki-infra-ca lives in 'secrets' ns, but this Job's"
                echo "   RBAC intentionally doesn't grant access — apply manually"
                echo "   as a one-shot from a privileged context, or add a separate"
                echo "   sealed Job with explicit secret read.)"
                echo "  Continuing with role + auth setup so subsequent re-runs"
                echo "  pick up the loaded CA without restarting from scratch."
              fi

              # ─── 4. Issuer URLs (CRL/OCSP discovery) ─────────────────────
              # Always (re)write — cheap and ensures URLs match the current
              # OpenBao service DNS even if a previous bootstrap used a
              # stale name.
              echo "Configuring issuer URLs..."
              $BAO bao write pki_int/config/urls \
                issuing_certificates="https://openbao-infra.secrets.svc.cluster.local:8200/v1/pki_int/ca" \
                crl_distribution_points="https://openbao-infra.secrets.svc.cluster.local:8200/v1/pki_int/crl" >/dev/null

              # ─── 5. cert-manager role on pki_int (strict EC) ─────────────
              # Same role as the old terraform_data:
              #   - allow_any_name=true: cert-manager Certificate CR
              #     validates CN/SAN, role doesn't need to.
              #   - max_ttl=35040h (4y): covers 10y Certificate.duration
              #     spec'd by CNPG + identity-pg (PKI truncates, cert-manager
              #     computes renewalTime from actual notAfter, no renewal
              #     storm as long as max_ttl >> renewBefore=720h).
              #   - key_type=ec, key_bits=0: only ECDSA (any curve P-256/
              #     P-384). Default key_type=rsa would reject every
              #     Certificate in this repo.
              echo "Writing pki_int/roles/cluster-issuer..."
              $BAO bao write pki_int/roles/cluster-issuer \
                allow_any_name=true \
                enforce_hostnames=false \
                max_ttl=35040h \
                key_type=ec \
                key_bits=0 \
                allowed_uri_sans="spiffe://st4ck/*" >/dev/null

              # ─── 5b. Cilium-specific role (RSA tolerated, scoped) ────────
              # Cilium hubble.tls.auto hardcodes RSA-2048 (no override
              # exposed). Strict cluster-issuer rejects RSA → 2nd role
              # accepts any key type but allowed_domains scoped to the
              # two Cilium hubble CN suffixes only:
              #   - *.hubble-grpc.cilium.io   → hubble-server-certs
              #   - *.hubble-relay.cilium.io  → hubble-relay-client-certs
              echo "Writing pki_int/roles/cilium-hubble..."
              $BAO bao write pki_int/roles/cilium-hubble \
                allowed_domains="hubble-grpc.cilium.io,hubble-relay.cilium.io" \
                allow_subdomains=true \
                allow_glob_domains=true \
                enforce_hostnames=false \
                max_ttl=26280h \
                key_type=any \
                key_bits=0 >/dev/null

              # ─── 6. cert-manager Kubernetes auth role + policy ──────────
              # Kubernetes auth method may already be enabled (ESO too) —
              # silence "already in use", then verify presence.
              echo "Ensuring auth/kubernetes is enabled..."
              $BAO bao auth enable kubernetes 2>&1 | grep -v "path is already in use" || true
              $BAO bao auth list -format=json 2>&1 | grep -q '"kubernetes/"' || \
                { echo "ERROR: auth/kubernetes not present"; exit 1; }

              echo "Configuring auth/kubernetes (idempotent)..."
              $BAO bao write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc:443" \
                disable_local_ca_jwt=false 2>&1 | tail -1 || true

              echo "Writing cert-manager policy..."
              # Inline heredoc — same content as the old terraform_data.
              $BAO bao policy write cert-manager - <<'POLICY'
              path "pki_int/sign/cluster-issuer" {
                capabilities = ["update"]
              }
              path "pki_int/issue/cluster-issuer" {
                capabilities = ["update"]
              }
              # ADR-028 wave 4 — Cilium hubble certs use a separate role
              # (cilium-hubble) because Cilium hardcodes RSA-2048 and the
              # main cluster-issuer enforces key_type=ec.
              path "pki_int/sign/cilium-hubble" {
                capabilities = ["update"]
              }
              path "pki_int/issue/cilium-hubble" {
                capabilities = ["update"]
              }
              POLICY

              echo "Binding cert-manager SA → cert-manager policy..."
              $BAO bao write auth/kubernetes/role/cert-manager \
                bound_service_account_names=cert-manager \
                bound_service_account_namespaces=cert-manager \
                policies=cert-manager ttl=24h >/dev/null

              echo "OpenBao PKI engine bootstrapped (Phase F-bis-2 v3)."
