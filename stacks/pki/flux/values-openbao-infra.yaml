# OpenBao Infra — PKI backend + infrastructure secrets
# HA mode with Raft storage (3 replicas) + static seal + self-init + TLS

global:
  tlsDisable: false

server:
  dev:
    enabled: false

  standalone:
    enabled: false

  # Phase F-bis-2 — Helm-native HA: deploy 3 replicas d'emblée with
  # podManagementPolicy=OrderedReady. K8s GARANTIT que pod-0 est Ready
  # AVANT que pod-1 soit créé (et idem pod-2 vs pod-1) — la race window
  # qui causait le bug split-brain OpenBao 2.x #2274 (chaque pod
  # self-init son propre 1-node raft cluster) est éliminée
  # architecturalement par le séquencement K8s.
  # Remplace l'ancien pattern terraform_data.openbao_*_scale_to_ha
  # (Fix #5/#11/#32) qui scalait 1→3 par script bash.
  statefulSet:
    podManagementPolicy: OrderedReady

  # Liveness initialDelaySeconds: 60 → laisse le temps aux blocks
  # initialize {} de matérialiser sans flapping. Sans ça, livenessProbe
  # fail pendant les 30-60s d'init API → kubelet kill le pod en plein
  # init → loop infini.
  livenessProbe:
    initialDelaySeconds: 60

  # Readiness failureThreshold: 6 (vs default 2) → tolère ~30s pendant
  # raft join (period=5s × 6) avant de marquer pod NotReady.
  readinessProbe:
    failureThreshold: 6

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file   = "/openbao/userconfig/openbao-infra-tls/tls.crt"
          tls_key_file    = "/openbao/userconfig/openbao-infra-tls/tls.key"
        }

        storage "raft" {
          path = "/openbao/data"

          # retry_join: pods 1+2 wait until pod-0 is the active leader,
          # then auto-join its Raft cluster. Without this each pod
          # initializes its own 1-node Raft cluster (= no HA, service
          # round-robin sends requests to empty followers). Discovered
          # postmortem 2026-04-26 — pods 1+2 had empty KV + missing
          # auth/kubernetes role, breaking cert-manager + ESO randomly.
          # leader_tls_servername MUST match a SAN on openbao-infra-tls.
          retry_join {
            leader_api_addr       = "https://openbao-infra-0.openbao-infra-internal:8200"
            leader_tls_servername = "openbao-infra"
            leader_ca_cert_file   = "/openbao/userconfig/openbao-infra-tls/ca.crt"
          }
          retry_join {
            leader_api_addr       = "https://openbao-infra-1.openbao-infra-internal:8200"
            leader_tls_servername = "openbao-infra"
            leader_ca_cert_file   = "/openbao/userconfig/openbao-infra-tls/ca.crt"
          }
          retry_join {
            leader_api_addr       = "https://openbao-infra-2.openbao-infra-internal:8200"
            leader_tls_servername = "openbao-infra"
            leader_ca_cert_file   = "/openbao/userconfig/openbao-infra-tls/ca.crt"
          }
        }

        service_registration "kubernetes" {}

        seal "static" {
          current_key_id = "infra-1"
          current_key    = "env://BAO_SEAL_KEY"
        }

        # ─── Self-init: KV v2 for cluster secrets ─────────────────────
        initialize "kv" {
          request "mount-kv" {
            operation = "update"
            path      = "sys/mounts/secret"
            data = {
              type    = "kv"
              options = { version = "2" }
            }
          }
        }

        # ─── Self-init: Transit for state encryption ──────────────────
        initialize "transit" {
          request "mount-transit" {
            operation = "update"
            path      = "sys/mounts/transit"
            data      = { type = "transit" }
          }
          request "create-state-key" {
            operation = "update"
            path      = "transit/keys/state-encryption"
            data      = { type = "aes256-gcm96" }
          }
        }

        # ─── Self-init: SSH CA for Flux ───────────────────────────────
        initialize "ssh-ca" {
          request "mount-ssh" {
            operation = "update"
            path      = "sys/mounts/ssh-client-signer"
            data      = { type = "ssh" }
          }
          request "generate-ca" {
            operation = "update"
            path      = "ssh-client-signer/config/ca"
            data      = { generate_signing_key = true }
          }
          request "flux-role" {
            operation = "update"
            path      = "ssh-client-signer/roles/flux"
            data = {
              key_type                = "ca"
              allowed_users           = "flux"
              default_user            = "flux"
              ttl                     = "2h"
              max_ttl                 = "24h"
              allow_user_certificates = true
            }
          }
        }

        # ─── Self-init: Policies ──────────────────────────────────────
        initialize "policies" {
          request "flux-ssh-policy" {
            operation = "update"
            path      = "sys/policies/acl/flux-ssh"
            data = {
              policy = "path \"ssh-client-signer/sign/flux\" { capabilities = [\"create\", \"update\"] }"
            }
          }
          request "eso-readonly-policy" {
            operation = "update"
            path      = "sys/policies/acl/eso-readonly"
            data = {
              # ESO permissions: read everywhere + write ONLY on the
              # explicit allowlist of CNPG-mirrored DSN paths. No
              # wildcards in middle segments — Vault syntax `*` only
              # works as the LAST segment, and `+` for single-segment
              # wildcards. Explicit absolute paths are safer (allowlist)
              # and avoid the "*/db/*" literal-path bug from the 2026-04-27
              # postmortem.
              # Adding a new PushSecret target = add the matching path
              # pair (data + metadata) here.
              policy = <<-EOP
                path "secret/data/*"     { capabilities = ["read"] }
                path "secret/metadata/*" { capabilities = ["read", "list"] }

                # CNPG → OpenBao mirrors (PushSecret writes here)
                path "secret/data/identity/db/postgres"     { capabilities = ["create", "update", "read", "delete", "patch"] }
                path "secret/metadata/identity/db/postgres" { capabilities = ["create", "update", "read", "delete", "list", "patch"] }
                path "secret/data/security/db/openclarity"     { capabilities = ["create", "update", "read", "delete", "patch"] }
                path "secret/metadata/security/db/openclarity" { capabilities = ["create", "update", "read", "delete", "list", "patch"] }

                # Harbor → OpenBao mirror (PushSecret writes Garage S3
                # access/secret keys here so the harbor-secrets ES can
                # template them into the helm values fragment).
                path "secret/data/storage/harbor-s3"     { capabilities = ["create", "update", "read", "delete", "patch"] }
                path "secret/metadata/storage/harbor-s3" { capabilities = ["create", "update", "read", "delete", "list", "patch"] }

                # Grafana → OpenBao (currently tofu-seeded; future
                # PushSecret targets would 403 silently without this
                # write entry). Postmortem 2026-04-29 (#16).
                path "secret/data/monitoring/grafana"     { capabilities = ["create", "update", "read", "delete", "patch"] }
                path "secret/metadata/monitoring/grafana" { capabilities = ["create", "update", "read", "delete", "list", "patch"] }
                EOP
            }
          }
          request "admin-policy" {
            operation = "update"
            path      = "sys/policies/acl/admin"
            data = {
              policy = "path \"*\" { capabilities = [\"create\",\"update\",\"read\",\"delete\",\"list\",\"sudo\"] }"
            }
          }
          # ─── Kamaji tenant KMS template policy ──────────────────────
          # Used as the base template for per-tenant policies created by the
          # ManagedCluster controller. Each tenant gets a policy named
          # `kamaji-kms-tenant-<name>` scoped to its own transit key.
          # This entry is a reference policy (unused directly, tenants get copies).
          request "kamaji-kms-template-policy" {
            operation = "update"
            path      = "sys/policies/acl/kamaji-kms-template"
            data = {
              policy = "# Template — per-tenant policies are named kamaji-kms-tenant-<name>\n# and are created on tenant provisioning by the ManagedCluster controller.\n# Each tenant policy grants encrypt/decrypt/rewrap on its OWN key only.\n\npath \"transit/encrypt/tenant-TEMPLATE\" { capabilities = [\"update\"] }\npath \"transit/decrypt/tenant-TEMPLATE\" { capabilities = [\"update\"] }\npath \"transit/rewrap/tenant-TEMPLATE\"  { capabilities = [\"update\"] }\n"
            }
          }
        }

        # ─── Self-init: AppRole auth (Kamaji KMS sidecars) ───────────
        # Each tenant's vault-kms-plugin sidecar authenticates here with a
        # unique role-id + secret-id pair. Per-tenant AppRole roles are
        # created on-demand by the ManagedCluster controller.
        initialize "approle-auth" {
          request "enable-approle-auth" {
            operation = "update"
            path      = "sys/auth/approle"
            data      = { type = "approle" }
          }
        }

        # ─── Self-init: K8s auth (Flux SSH + ESO) ───────────────────
        initialize "k8s-auth" {
          request "enable-k8s-auth" {
            operation = "update"
            path      = "sys/auth/kubernetes"
            data      = { type = "kubernetes" }
          }
          request "configure-k8s-auth" {
            operation = "update"
            path      = "auth/kubernetes/config"
            data      = { kubernetes_host = "https://kubernetes.default.svc" }
          }
          request "flux-ssh-role" {
            operation = "update"
            path      = "auth/kubernetes/role/flux-ssh"
            data = {
              bound_service_account_names      = "flux2-source-controller"
              bound_service_account_namespaces = "flux-system"
              policies                         = "flux-ssh"
              ttl                              = "1h"
            }
          }
          request "eso-role" {
            operation = "update"
            path      = "auth/kubernetes/role/eso"
            data = {
              bound_service_account_names      = "external-secrets"
              bound_service_account_namespaces = "external-secrets"
              policies                         = "eso-readonly"
              ttl                              = "1h"
            }
          }
        }

        # ─── Self-init: Admin userpass (break-glass access) ─────────
        # MUST be before any block that might fail — OpenBao aborts the
        # remaining `initialize` blocks on the first error, and we depend
        # on admin existing for seed_openbao_secrets to log in.
        initialize "admin" {
          request "mount-userpass" {
            operation = "update"
            path      = "sys/auth/userpass"
            data      = { type = "userpass" }
          }
          request "create-admin" {
            operation = "update"
            path      = "auth/userpass/users/admin"
            data = {
              "password" = {
                eval_type   = "string"
                eval_source = "env"
                env_var     = "BAO_ADMIN_PASSWORD"
              }
              "token_policies" = ["admin"]
            }
          }
        }

  extraSecretEnvironmentVars:
    - envName: BAO_SEAL_KEY
      secretName: openbao-seal-key
      secretKey: key
    - envName: BAO_ADMIN_PASSWORD
      secretName: openbao-admin-password
      secretKey: password

  extraVolumes:
    - type: secret
      name: openbao-infra-tls

  dataStorage:
    enabled: true
    size: 1Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi

injector:
  enabled: true
  replicas: 1
  agentImage:
    registry: "quay.io"
    repository: "openbao/openbao"
  agentDefaults:
    cpuRequest: "50m"
    cpuLimit: "250m"
    memRequest: "64Mi"
    memLimit: "128Mi"
  webhook:
    failurePolicy: Ignore

csi:
  enabled: false

ui:
  enabled: true
