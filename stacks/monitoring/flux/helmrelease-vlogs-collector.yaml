apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
  namespace: monitoring
spec:
  interval: 30m
  dependsOn:
    - name: victoria-logs
  chart:
    spec:
      chart: victoria-logs-collector
      # Pin matches stacks/monitoring/variables.tf
      # variable.victoria_logs_collector_version.default — keep them in sync.
      version: "0.2.11"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: vlogs-collector-values
      valuesKey: values.yaml
      optional: false
