# Day-2 reconciliation of grafana-admin from OpenBao Infra.
#
# On initial tofu apply the same Secret is bootstrapped directly by
# stacks/monitoring/main.tf:kubernetes_secret.grafana_admin so the
# Grafana sub-chart Pod has it on first start. Once Flux applies this
# manifest, ESO becomes the authoritative writer: every refreshInterval
# it reads secret/monitoring/grafana from OpenBao and rewrites the
# `grafana-admin` Secret. Because both sides were seeded from the same
# random_password.grafana_admin, the takeover is data-identical and
# does NOT rotate the credentials (no Grafana session loss).
#
# Target name `grafana-admin` is intentionally distinct from the
# `grafana` Secret the chart auto-generates when no `existingSecret` is
# set — keeps ownership unambiguous (chart owns nothing, ESO owns
# grafana-admin).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-infra
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Merge
  data:
    - secretKey: admin-user
      remoteRef:
        key: monitoring/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: monitoring/grafana
        property: admin-password
