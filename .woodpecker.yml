when:
  - event: [push, pull_request]
    branch: main

variables:
  - &tofu_image ghcr.io/opentofu/opentofu:1.9
  - &kubectl_image bitnami/kubectl:1.35
  - &secrets_dir /woodpecker/src/kms-output
  - &deploy_only
    when:
      - event: push
        branch: main

  # Helper: load cluster secrets, extract kubeconfig, then init+apply a stack.
  # Secrets are read from files mounted via WOODPECKER_BACKEND_DOCKER_VOLUMES.
  - &deploy_stack_commands |
    . /woodpecker/src/kms-output/load-cluster-env.sh
    cd terraform/envs/scaleway && tofu init -input=false >/dev/null
    tofu output -raw kubeconfig > /tmp/kubeconfig
    cd ../../../terraform/stacks/${STACK}
    tofu init -input=false
    tofu apply -auto-approve \
      -var="kubeconfig_path=/tmp/kubeconfig"

steps:
  # ─── Validate (PR + push) ─────────────────────────────────────────
  - name: validate
    image: *tofu_image
    commands:
      - |
        for dir in \
          terraform/envs/scaleway/image \
          terraform/envs/scaleway \
          terraform/envs/scaleway/ci \
          terraform/stacks/k8s-cni \
          terraform/stacks/k8s-monitoring \
          terraform/stacks/k8s-pki \
          terraform/stacks/k8s-identity \
          terraform/stacks/k8s-security \
          terraform/stacks/k8s-storage \
          terraform/stacks/flux-bootstrap; do
          echo "--- validating $dir"
          cd "$dir" && tofu init -backend=false -input=false >/dev/null && tofu validate && cd /woodpecker/src
        done

  # ─── Build image (push only) ──────────────────────────────────────
  - name: build-image
    image: *tofu_image
    commands:
      - . /woodpecker/src/kms-output/load-image-env.sh
      - cd terraform/envs/scaleway/image
      - tofu init -input=false
      - tofu apply -auto-approve
        -var="project_id=$${SCW_PROJECT_ID}"
        -var="scw_access_key=$${SCW_ACCESS_KEY}"
        -var="scw_secret_key=$${SCW_SECRET_KEY}"
    <<: *deploy_only

  # ─── Deploy cluster ───────────────────────────────────────────────
  - name: deploy-cluster
    image: *tofu_image
    commands:
      - . /woodpecker/src/kms-output/load-cluster-env.sh
      - cd terraform/envs/scaleway
      - tofu init -input=false
      - tofu apply -auto-approve
        -var="project_id=$${SCW_PROJECT_ID}"
    depends_on: [build-image]
    <<: *deploy_only

  # ─── Wait for API server ──────────────────────────────────────────
  - name: wait-api
    image: *tofu_image
    commands:
      - . /woodpecker/src/kms-output/load-cluster-env.sh
      - apk add --no-cache kubectl >/dev/null 2>&1 || true
      - cd terraform/envs/scaleway && tofu init -input=false >/dev/null
      - |
        echo "Waiting for API server..."
        for i in $(seq 1 30); do
          tofu output -raw kubeconfig | kubectl --kubeconfig /dev/stdin get nodes >/dev/null 2>&1 && break
          echo "  attempt $i/30..." && sleep 10
        done
        echo "API server ready."
    depends_on: [deploy-cluster]
    <<: *deploy_only

  # ─── Stage 4: Cilium CNI (must be first) ─────────────────────────
  - name: deploy-cni
    image: *tofu_image
    environment:
      STACK: k8s-cni
    commands:
      - *deploy_stack_commands
    depends_on: [wait-api]
    <<: *deploy_only

  # ─── Stage 5: PKI + OpenBao + cert-manager ───────────────────────
  - name: deploy-pki
    image: *tofu_image
    environment:
      STACK: k8s-pki
    commands:
      - *deploy_stack_commands
    depends_on: [deploy-cni]
    <<: *deploy_only

  # ─── Stage 6: Monitoring (after PKI — needs cert-manager) ─────────
  - name: deploy-monitoring
    image: *tofu_image
    environment:
      STACK: k8s-monitoring
    commands:
      - *deploy_stack_commands
    depends_on: [deploy-pki]
    <<: *deploy_only

  # ─── Stage 7: Identity (Ory Stack, after monitoring) ───────────────
  - name: deploy-identity
    image: *tofu_image
    environment:
      STACK: k8s-identity
    commands:
      - *deploy_stack_commands
    depends_on: [deploy-monitoring]
    <<: *deploy_only

  # ─── Stage 8: Security (after identity) ────────────────────────────
  - name: deploy-security
    image: *tofu_image
    environment:
      STACK: k8s-security
    commands:
      - *deploy_stack_commands
    depends_on: [deploy-identity]
    <<: *deploy_only

  # ─── Stage 9: Storage (after security) ─────────────────────────────
  - name: deploy-storage
    image: *tofu_image
    environment:
      STACK: k8s-storage
    commands:
      - *deploy_stack_commands
    depends_on: [deploy-security]
    <<: *deploy_only

  # ─── Stage 10: Flux bootstrap (after all stacks) ───────────────────
  - name: deploy-flux
    image: *tofu_image
    environment:
      STACK: flux-bootstrap
    commands:
      - *deploy_stack_commands
    depends_on: [deploy-storage]
    <<: *deploy_only
