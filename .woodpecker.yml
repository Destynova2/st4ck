when:
  - event: [push, pull_request]
    branch: main

variables:
  - &tofu_image ghcr.io/opentofu/opentofu:1.9
  - &deploy_only
    when:
      - event: push
        branch: main

steps:
  # ─── Validate (PR + push) — no secrets needed ─────────────────────
  - name: validate
    image: *tofu_image
    commands:
      - |
        for dir in \
          envs/scaleway/image \
          envs/scaleway \
          envs/scaleway/ci \
          stacks/cni \
          stacks/monitoring \
          stacks/pki \
          stacks/identity \
          stacks/security \
          stacks/storage \
          stacks/flux-bootstrap; do
          echo "--- validating $dir"
          cd "$dir" && tofu init -backend=false -input=false >/dev/null && tofu validate && cd /woodpecker/src
        done

  # ─── Build image (phase 1: start builder VM) ────────────────────────
  - name: start-builder
    image: *tofu_image
    secrets:
      - scw_project_id
      - tf_http_username
      - tf_http_password
      - source: scw_image_access_key
        target: scw_access_key
      - source: scw_image_secret_key
        target: scw_secret_key
    commands:
      - cd envs/scaleway/image
      - tofu init -input=false
      - tofu apply -auto-approve
        -target=scaleway_object_bucket.talos_image
        -target=scaleway_instance_ip.builder
        -target=scaleway_instance_server.builder
        -var="project_id=$${SCW_PROJECT_ID}"
        -var="scw_access_key=$${SCW_ACCESS_KEY}"
        -var="scw_secret_key=$${SCW_SECRET_KEY}"
    <<: *deploy_only

  # ─── Build image (gate: wait for S3 upload) ────────────────────────
  - name: wait-image-upload
    image: *tofu_image
    secrets:
      - scw_project_id
      - source: scw_image_access_key
        target: scw_access_key
      - source: scw_image_secret_key
        target: scw_secret_key
    commands:
      - |
        BUCKET="talos-image-$${SCW_PROJECT_ID}"
        ENDPOINT="https://$${BUCKET}.s3.fr-par.scw.cloud/.upload-complete"
        echo "Waiting for image upload (polling $${ENDPOINT})..."
        for i in $$(seq 1 60); do
          STATUS=$$(curl -s -o /dev/null -w "%{http_code}" "$$ENDPOINT" 2>/dev/null || echo "000")
          [ "$$STATUS" = "200" ] && echo "Upload complete!" && exit 0
          echo "  attempt $$i/60 (HTTP $$STATUS)"
          sleep 15
        done
        echo "ERROR: Timeout" && exit 1
    depends_on: [start-builder]
    <<: *deploy_only

  # ─── Build image (phase 2: import snapshots + create images) ───────
  - name: build-image
    image: *tofu_image
    secrets:
      - scw_project_id
      - tf_http_username
      - tf_http_password
      - source: scw_image_access_key
        target: scw_access_key
      - source: scw_image_secret_key
        target: scw_secret_key
    commands:
      - cd envs/scaleway/image
      - tofu init -input=false
      - tofu apply -auto-approve
        -var="project_id=$${SCW_PROJECT_ID}"
        -var="scw_access_key=$${SCW_ACCESS_KEY}"
        -var="scw_secret_key=$${SCW_SECRET_KEY}"
    depends_on: [wait-image-upload]
    <<: *deploy_only

  # ─── Deploy cluster ───────────────────────────────────────────────
  - name: deploy-cluster
    image: *tofu_image
    secrets:
      - scw_project_id
      - tf_http_username
      - tf_http_password
      - source: scw_cluster_access_key
        target: scw_access_key
      - source: scw_cluster_secret_key
        target: scw_secret_key
    commands:
      - |
        VB=http://host.containers.internal:8080
        cd envs/scaleway
        tofu init -input=false \
          -backend-config="address=$$VB/state/scaleway" \
          -backend-config="lock_address=$$VB/state/scaleway" \
          -backend-config="unlock_address=$$VB/state/scaleway"
        tofu apply -auto-approve \
          -var="project_id=$${SCW_PROJECT_ID}"
    depends_on: [build-image]
    <<: *deploy_only

  # ─── Wait for API server ──────────────────────────────────────────
  - name: wait-api
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands:
      - |
        VB=http://host.containers.internal:8080
        apk add --no-cache kubectl >/dev/null 2>&1 || true
        cd envs/scaleway
        tofu init -input=false \
          -backend-config="address=$$VB/state/scaleway" \
          -backend-config="lock_address=$$VB/state/scaleway" \
          -backend-config="unlock_address=$$VB/state/scaleway" >/dev/null
        echo "Waiting for API server..."
        for i in $$(seq 1 30); do
          tofu output -raw kubeconfig | kubectl --kubeconfig /dev/stdin get nodes >/dev/null 2>&1 && break
          echo "  attempt $$i/30..." && sleep 10
        done
        echo "API server ready."
    depends_on: [deploy-cluster]
    <<: *deploy_only

  # ─── Deploy stacks ────────────────────────────────────────────────
  # Order: cni → pki → monitoring → identity → security → storage → flux
  # Secrets: generated by bootstrap OpenBao sidecar, read via vault provider.
  # In-cluster OpenBao (deployed by k8s-pki) is initialized day-2.

  - name: deploy-cni
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: &deploy_stack
      - |
        VB=http://host.containers.internal:8080
        vb_init() {
          tofu init -input=false \
            -backend-config="address=$$VB/state/$$1" \
            -backend-config="lock_address=$$VB/state/$$1" \
            -backend-config="unlock_address=$$VB/state/$$1"
        }
        cd envs/scaleway
        vb_init scaleway >/dev/null
        tofu output -raw kubeconfig > /tmp/kubeconfig
        cd /woodpecker/src/stacks/$${STACK}
        vb_init $${STACK}
        tofu apply -auto-approve -var="kubeconfig_path=/tmp/kubeconfig"
    environment:
      STACK: cni
    depends_on: [wait-api]
    <<: *deploy_only

  - name: deploy-pki
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: pki
    depends_on: [deploy-cni]
    <<: *deploy_only

  - name: deploy-monitoring
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: monitoring
    depends_on: [deploy-pki]
    <<: *deploy_only

  - name: deploy-identity
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: identity
    depends_on: [deploy-monitoring]
    <<: *deploy_only

  - name: deploy-security
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: security
    depends_on: [deploy-identity]
    <<: *deploy_only

  - name: deploy-storage
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: storage
    depends_on: [deploy-security]
    <<: *deploy_only

  - name: deploy-flux
    image: *tofu_image
    secrets: [tf_http_username, tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: flux-bootstrap
    depends_on: [deploy-storage]
    <<: *deploy_only
