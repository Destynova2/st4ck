when:
  - event: [push, pull_request]
    branch: main

variables:
  - &tofu_image ghcr.io/opentofu/opentofu:1.9
  - &deploy_only
    when:
      - event: push
        branch: main

steps:
  # ─── Validate (PR + push) — no secrets needed ─────────────────────
  - name: validate
    image: *tofu_image
    commands:
      - |
        for dir in \
          terraform/envs/scaleway/image \
          terraform/envs/scaleway \
          terraform/envs/scaleway/ci \
          terraform/stacks/k8s-cni \
          terraform/stacks/k8s-monitoring \
          terraform/stacks/k8s-pki \
          terraform/stacks/k8s-identity \
          terraform/stacks/k8s-security \
          terraform/stacks/k8s-storage \
          terraform/stacks/flux-bootstrap; do
          echo "--- validating $dir"
          cd "$dir" && tofu init -backend=false -input=false >/dev/null && tofu validate && cd /woodpecker/src
        done

  # ─── Build image ───────────────────────────────────────────────────
  - name: build-image
    image: *tofu_image
    secrets:
      - scw_project_id
      - tf_http_password
      - source: scw_image_access_key
        target: scw_access_key
      - source: scw_image_secret_key
        target: scw_secret_key
    commands:
      - cd terraform/envs/scaleway/image
      - tofu init -input=false
      - tofu apply -auto-approve
        -var="project_id=$${SCW_PROJECT_ID}"
        -var="scw_access_key=$${SCW_ACCESS_KEY}"
        -var="scw_secret_key=$${SCW_SECRET_KEY}"
    <<: *deploy_only

  # ─── Deploy cluster ───────────────────────────────────────────────
  - name: deploy-cluster
    image: *tofu_image
    secrets:
      - scw_project_id
      - tf_http_password
      - source: scw_cluster_access_key
        target: scw_access_key
      - source: scw_cluster_secret_key
        target: scw_secret_key
    commands:
      - cd terraform/envs/scaleway
      - tofu init -input=false
      - tofu apply -auto-approve
        -var="project_id=$${SCW_PROJECT_ID}"
    depends_on: [build-image]
    <<: *deploy_only

  # ─── Wait for API server ──────────────────────────────────────────
  - name: wait-api
    image: *tofu_image
    secrets: [tf_http_password]
    commands:
      - apk add --no-cache kubectl >/dev/null 2>&1 || true
      - cd terraform/envs/scaleway && tofu init -input=false >/dev/null
      - |
        echo "Waiting for API server..."
        for i in $(seq 1 30); do
          tofu output -raw kubeconfig | kubectl --kubeconfig /dev/stdin get nodes >/dev/null 2>&1 && break
          echo "  attempt $i/30..." && sleep 10
        done
        echo "API server ready."
    depends_on: [deploy-cluster]
    <<: *deploy_only

  # ─── Deploy stacks (all use kubeconfig from scaleway state) ────────
  - name: deploy-cni
    image: *tofu_image
    secrets: [tf_http_password]
    commands: &deploy_stack
      - cd terraform/envs/scaleway && tofu init -input=false >/dev/null
      - tofu output -raw kubeconfig > /tmp/kubeconfig
      - cd /woodpecker/src/terraform/stacks/$${STACK}
      - tofu init -input=false
      - tofu apply -auto-approve -var="kubeconfig_path=/tmp/kubeconfig"
    environment:
      STACK: k8s-cni
    depends_on: [wait-api]
    <<: *deploy_only

  - name: deploy-pki
    image: *tofu_image
    secrets: [tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: k8s-pki
    depends_on: [deploy-cni]
    <<: *deploy_only

  - name: deploy-monitoring
    image: *tofu_image
    secrets: [tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: k8s-monitoring
    depends_on: [deploy-pki]
    <<: *deploy_only

  - name: deploy-identity
    image: *tofu_image
    secrets: [tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: k8s-identity
    depends_on: [deploy-monitoring]
    <<: *deploy_only

  - name: deploy-security
    image: *tofu_image
    secrets: [tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: k8s-security
    depends_on: [deploy-identity]
    <<: *deploy_only

  - name: deploy-storage
    image: *tofu_image
    secrets: [tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: k8s-storage
    depends_on: [deploy-security]
    <<: *deploy_only

  - name: deploy-flux
    image: *tofu_image
    secrets: [tf_http_password]
    commands: *deploy_stack
    environment:
      STACK: flux-bootstrap
    depends_on: [deploy-storage]
    <<: *deploy_only
