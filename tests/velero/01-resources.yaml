apiVersion: v1
kind: Namespace
metadata:
  name: velero-chainsaw-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-data
  namespace: velero-chainsaw-test
data:
  key1: value1
  key2: value2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: velero-chainsaw-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
